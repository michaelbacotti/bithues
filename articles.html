<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articles – bithues</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #0a0a0f; --surface: #12121a; --border: #2a2a3a; --text: #e8e8f0; --text-dim: #7a7a90; --accent: #7c3aed; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; }
        .container { max-width: 800px; margin: 0 auto; padding: 0 1.5rem; }
        
        .sticky-bar {
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 100;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
        }
        .sticky-bar .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        .sticky-bar .logo { font-size: 1.25rem; font-weight: 700; color: var(--text); text-decoration: none; }
        .sticky-bar .logo span { color: var(--accent); }
        .sticky-bar .nav-links a { color: var(--text-dim); text-decoration: none; font-size: 0.9rem; margin-left: 1rem; }
        .sticky-bar .nav-links a:hover, .sticky-bar .nav-links a.active { color: var(--text); }
        
        .page-header { padding: 2rem 0; }
        .page-header h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .page-header p { color: var(--text-dim); }
        
        .coming-soon {
            text-align: center;
            padding: 4rem 0;
        }
        .coming-soon h2 { font-size: 1.5rem; margin-bottom: 1rem; }
        .coming-soon p { color: var(--text-dim); max-width: 500px; margin: 0 auto; }
        
        footer { padding: 2rem 0; text-align: center; border-top: 1px solid var(--border); }
        footer p { color: var(--text-dim); font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sticky-bar">
            <div class="nav">
                <a href="index.html" class="logo">bithues<span> Reading Lab</span></a>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="reviews/index.html">Reviews</a>
                    <a href="catalog.html">Catalog</a>
                    <a href="articles.html" class="active">Articles</a>
                </div>
            </div>
        </div>
        
        <section class="page-header">
            <h1>Articles</h1>
            <p>In-depth thoughts on books, reading, and ideas.</p>
        </section>
        
        <div class="coming-soon">
            <h2>Coming Soon</h2>
            <p>We're working on in-depth articles about books, reading trends, and ideas. Check back soon!</p>
        </div>
        
        <footer>
            <p>© <span id="year"></span> bithues</p>
        </footer>
    </div>
    
    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
