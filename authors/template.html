<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GENRE - Author NAME on Bithues Reading Lab">
    <meta property="og:title" content="NAME | Bithues Reading Lab">
    <meta property="og:description" content="BOOK_COUNT books by NAME on Bithues Reading Lab">
    <meta property="og:type" content="profile">
    <title>NAME | Bithues Reading Lab</title>
    <script>
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #0a0a0f; --surface: #12121a; --border: #2a2a3a; --text: #e8e8f0; --text-dim: #7a7a90; --accent: #7c3aed; }
        [data-theme="light"] { --bg: #f5f5f5; --surface: #ffffff; --border: #e0e0e0; --text: #1a1a1a; --text-dim: #666666; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; }
        .container { max-width: 800px; margin: 0 auto; padding: 0 1.5rem; }
        header { padding: 2rem 0; border-bottom: 1px solid var(--border); }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; flex-wrap: wrap; gap: 1rem; }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--text); text-decoration: none; }
        .logo span { color: var(--accent); }
        nav a { color: var(--text-dim); text-decoration: none; margin-left: 1.5rem; }
        
        .author-header { padding: 3rem 0; text-align: center; }
        .author-header h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .author-header .genre { display: inline-block; background: var(--accent); color: white; font-size: 0.8rem; padding: 0.3rem 0.8rem; border-radius: 15px; margin-bottom: 1rem; }
        .author-header .bio { color: var(--text-dim); font-size: 1rem; max-width: 600px; margin: 0 auto 1rem; }
        .author-header .book-count { color: var(--text-dim); font-size: 0.9rem; }
        
        .books-section { padding: 2rem 0; }
        .books-section h2 { font-size: 1.5rem; margin-bottom: 2rem; }
        .book-card { padding: 1.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 1.5rem; }
        .book-card h3 { font-size: 1.25rem; margin-bottom: 0.5rem; }
        .book-card h3 a { color: var(--text); text-decoration: none; }
        .book-card h3 a:hover { color: var(--accent); }
        .book-card .tldr { color: var(--text-dim); margin-bottom: 1rem; }
        .book-card .meta { font-size: 0.9rem; color: var(--text-dim); }
        
        footer { padding: 2rem 0; text-align: center; border-top: 1px solid var(--border); color: var(--text-dim); font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <nav>
                <a href="../index.html" class="logo">Bithues<span> Reading Lab</span></a>
                <div>
                    <a href="../index.html">Home</a>
                    <a href="../catalog.html">Catalog</a>
                    <a href="../articles.html">Articles</a>
                    <a href="../stories.html">Stories</a>
                    <a href="../authors.html">Authors</a>
                    <a href="../about.html">About</a>
                </div>
            </nav>
        </header>

        <section class="author-header">
            <h1>NAME</h1>
            <span class="genre">GENRE</span>
            <p class="bio">BIO</p>
            <p class="book-count">BOOK_COUNT books reviewed</p>
        </section>

        <section class="books-section">
            <h2>Books by NAME</h2>
            BOOKS_LIST
        </section>

        <footer>
            <p>© <span id="year"></span> Bithues Reading Lab</p>
        </footer>
    </div>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
