    <div class="hero-eyebrow">Game</div>
    <h1>Memory Match</h1>
    <p class="hero-sub"></p>
  </header>
  <div class="divider"></div>

    <div class="container">
        <header>
            <a href="games.html">← Back to Games</a>
            <h1 class="header">🃏 Memory Match</h1>
            <p>Find all matching pairs!</p>
        </header>
        
        <div class="stats">
            Moves: <span id="moves">0</span> | Pairs: <span id="pairs">0</span>/8
        </div>
        <div class="grid" id="grid"></div>
        <button class="btn" onclick="initGame()">New Game</button>
    </div>

    <script>
        const emojis = ['📚', '📖', '✏️', '🎓', '📝', '📕', '📗', '📘'];
        let cards = [];
        let flipped = [];
        let moves = 0;
        let matches = 0;
        
        function initGame() {
            cards = [...emojis, ...emojis].sort(() => Math.random() - 0.5);
            flipped = [];
            moves = 0;
            matches = 0;
            document.getElementById('moves').textContent = 0;
            document.getElementById('pairs').textContent = 0;
            
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            cards.forEach((emoji, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.textContent = '?';
                card.dataset.index = i;
                card.onclick = () => flipCard(card);
                grid.appendChild(card);
            });
        }
        
        function flipCard(card) {
            if (flipped.length >= 2 || card.classList.contains('flipped') || card.classList.contains('matched')) return;
            
            card.textContent = cards[card.dataset.index];
            card.classList.add('flipped');
            flipped.push(card);
            
            if (flipped.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                
                if (cards[flipped[0].dataset.index] === cards[flipped[1].dataset.index]) {
                    flipped.forEach(c => c.classList.add('matched'));
                    flipped = [];
                    matches++;
                    document.getElementById('pairs').textContent = matches;
                    if (matches === 8) {
                        setTimeout(() => alert(`🎉 You won in ${moves} moves!`), 300);
                    }
                } else {
                    setTimeout(() => {
                        flipped.forEach(c => {
                            c.textContent = '?';
                            c.classList.remove('flipped');
                        });
                        flipped = [];
                    }, 800);
                }
            }
        }
        
        initGame();
    </script>
