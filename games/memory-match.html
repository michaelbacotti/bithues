<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match | Bithues Reading Lab</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #0a0a0f; --surface: #12121a; --border: #2a2a3a; --text: #e8e8f0; --text-dim: #7a7a90; --accent: #7c3aed; }
        [data-theme="light"] { --bg: #f5f5f5; --surface: #ffffff; --border: #e0e0e0; --text: #1a1a1a; --text-dim: #666666; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; padding: 1rem; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        header { padding: 1rem 0; margin-bottom: 1rem; border-bottom: 1px solid var(--border); }
        header a { color: var(--accent); text-decoration: none; }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        
        .stats { margin-bottom: 1rem; color: var(--text-dim); }
        
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 1rem 0; }
        .card { aspect-ratio: 1; background: var(--surface); border: 2px solid var(--border); border-radius: 8px; font-size: 2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; }
        .card:hover { transform: scale(1.05); }
        .card.flipped { background: var(--accent); color: white; border-color: var(--accent); }
        .card.matched { opacity: 0.5; pointer-events: none; }
        
        .btn { padding: 0.75rem 1.5rem; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
        
        @media (max-width: 400px) { .grid { gap: 5px; } .card { font-size: 1.5rem; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="games.html">← Back to Games</a>
            <h1>🃏 Memory Match</h1>
            <p>Find all matching pairs!</p>
        </header>
        
        <div class="stats">
            Moves: <span id="moves">0</span> | Pairs: <span id="pairs">0</span>/8
        </div>
        <div class="grid" id="grid"></div>
        <button class="btn" onclick="initGame()">New Game</button>
    </div>

    <script>
        const emojis = ['📚', '📖', '✏️', '🎓', '📝', '📕', '📗', '📘'];
        let cards = [];
        let flipped = [];
        let moves = 0;
        let matches = 0;
        
        function initGame() {
            cards = [...emojis, ...emojis].sort(() => Math.random() - 0.5);
            flipped = [];
            moves = 0;
            matches = 0;
            document.getElementById('moves').textContent = 0;
            document.getElementById('pairs').textContent = 0;
            
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            cards.forEach((emoji, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.textContent = '?';
                card.dataset.index = i;
                card.onclick = () => flipCard(card);
                grid.appendChild(card);
            });
        }
        
        function flipCard(card) {
            if (flipped.length >= 2 || card.classList.contains('flipped') || card.classList.contains('matched')) return;
            
            card.textContent = cards[card.dataset.index];
            card.classList.add('flipped');
            flipped.push(card);
            
            if (flipped.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                
                if (cards[flipped[0].dataset.index] === cards[flipped[1].dataset.index]) {
                    flipped.forEach(c => c.classList.add('matched'));
                    flipped = [];
                    matches++;
                    document.getElementById('pairs').textContent = matches;
                    if (matches === 8) {
                        setTimeout(() => alert(`🎉 You won in ${moves} moves!`), 300);
                    }
                } else {
                    setTimeout(() => {
                        flipped.forEach(c => {
                            c.textContent = '?';
                            c.classList.remove('flipped');
                        });
                        flipped = [];
                    }, 800);
                }
            }
        }
        
        initGame();
    </script>
</body>
</html>
