// ═══════════════════════════════════════════════════════════
// TOWNS
// ═══════════════════════════════════════════════════════════
// Town positions in world space (TWN_W x TWN_H world)
const TWN_W = 220, TWN_H = 180;
const TOWNS = [
  { name:'BARREN ROCK',  x:80,   y:200,  w:TWN_W, h:TWN_H, fuelMod:0.8, partsMod:1.0, weaponsMod:1.3 },
  { name:'DUSTY SPUR',   x:880,  y:200,  w:TWN_W, h:TWN_H, fuelMod:1.3, partsMod:1.0, weaponsMod:0.8 },
  { name:'NEW DENVER',   x:80,   y:900,  w:TWN_W, h:TWN_H, fuelMod:1.0, partsMod:1.0, weaponsMod:1.0 },
  { name:'IRON CITY',    x:880,  y:900,  w:TWN_W, h:TWN_H, fuelMod:1.2, partsMod:1.5, weaponsMod:1.2 },
];
const BASE_PRICES = {
  repair:80, armorPlate:120, fuel:25,
  machineGun:300, flamethrower:800, rockets:600, mines:200, oilSlick:150, smoke:250
};

// Roads connect towns (road segments between town centers)
const ROAD_SEGS = [
  // Barren Rock -> Dusty Spur (horizontal top)
  { from:0, to:1, y:290 },
  // Barren Rock -> New Denver (vertical left)
  { from:0, to:2, x:190 },
  // Dusty Spur -> Iron City (vertical right)
  { from:1, to:3, x:990 },
  // New Denver -> Iron City (horizontal bottom)
  { from:2, to:3, y:990 },
];
// Road is a horizontal/vertical strip between towns
const ROAD_WIDTH = 70;

const WORLD_W = 1100;
const WORLD_H = 1150;

// ═══════════════════════════════════════════════════════════
// ENEMY TYPES
// ═══════════════════════════════════════════════════════════
function makeEnemyDef(type) {
  const defs = {
    RoadWarrior:{ speed:60,  armor:20, hull:60, weapon:'MachineGun', behavior:'patrol', cash:75,  w:30, h:16, color:'#cc2200', dark:'#881100' },
    Raider:     { speed:90,  armor:10, hull:40, weapon:'Ram',        behavior:'charge',  cash:50,  w:22, h:12, color:'#cc6600', dark:'#883300' },
    Hunter:     { speed:50,  armor:30, hull:80, weapon:'Rockets',     behavior:'sniper',  cash:150, w:34, h:18, color:'#8800cc', dark:'#550088' },
    Ganger:     { speed:70,  armor:25, hull:50, weapon:'MachineGun', behavior:'pack',    cash:100, w:28, h:15, color:'#cc0044', dark:'#880022' },
  };
  return defs[type];
}

// ═══════════════════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════════════════
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  handleKeyDown(e.code);
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

function handleKeyDown(code) {
  // TITLE
  if (gameState === 'TITLE' && code === 'Space') { startGame(); return; }
  // GAMEOVER
  if (gameState === 'GAMEOVER' && code === 'Space') { startGame(); return; }
  // PAUSED - save prior state so we can restore correctly (skip during arena)
  if (gameState === 'DRIVING' && code === 'Escape' && !arenaActive) { prevStateBeforePause = 'DRIVING'; gameState = 'PAUSED'; return; }
  if (gameState === 'WALKING' && code === 'Escape' && !arenaActive) { prevStateBeforePause = 'WALKING'; gameState = 'PAUSED'; return; }
  if (gameState === 'PAUSED' && code === 'Escape') {
    // Restore to prior state: DRIVING if player has car, else WALKING
    if (prevStateBeforePause === 'DRIVING' && player.car) {
      gameState = 'DRIVING';
    } else {
      gameState = player.car ? 'DRIVING' : 'WALKING';
    }
    return;
  }
  // WALKING
  if (gameState === 'WALKING' && code === 'Escape') { /* can't pause on foot */ }
  // ARENA PROMPT - player on foot, no weapons
  if (gameState === 'ARENA_PROMPT') {
    if (code === 'Enter' || code === 'Space') { startArena(); return; }
    if (code === 'Escape') { gameState = 'WALKING'; return; }
    return; // Block all other input (no weapon firing on foot)
  }
  // WALKING - player on foot, no weapons
  if (gameState === 'WALKING') {
    if (code === 'Escape') { /* can't pause on foot */ }
    return; // Block weapon firing on foot
  }
  // GARAGE
  if (gameState === 'GARAGE') {
    handleGarageInput(code);
    return;
  }
  // DRIVING
  if (gameState === 'DRIVING') {
    if (code === 'Space') fireWeapon();
    if (code === 'Tab') { keys['Tab'] = false; cycleWeapon(); }
  }
}

// ═══════════════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════════════
let gameState = 'TITLE';
let prevStateBeforePause = 'DRIVING'; // Track prior state for proper unpause
let player = {};
let enemies = [];
let bullets = [];
let particles = [];
let droppedItems = []; // mines, oil, smoke clouds
let cam = { x:0, y:0 };
let shakeTimer = 0, shakeIntensity = 0;
let damageFlashTimer = 0;
let lastTime = 0;

// Stats
let stats = { cash:500, odometer:0, enemiesDestroyed:0, totalCashEarned:0 };

// Garage state
let garageTab = 0; // 0=BUY, 1=SELL, 2=REPAIR, 3=FUEL, 4=STATS
let garageSel = 0;
let garageTown = null;

// Current town for walking
let currentTownIndex = 0;

// Arena state
let arenaActive = false;
let arenaWave = 0;
let arenaKills = 0;
const ARENA_TOWN = 2; // New Denver is the arena town

// Cargo trading
let playerCargo = 0; // current cargo units
let cargoType = 'GENERAL'; // trade goods type

// Enemy spawn timer
let enemySpawnTimer = 0;
const ENEMY_SPAWN_INTERVAL = 6; // seconds

// ═══════════════════════════════════════════════════════════
// PLAYER CREATION
// ═══════════════════════════════════════════════════════════
function createWalkingPlayer(townIdx) {
  const t = TOWNS[townIdx];
  return {
    mode:'walking',
    x: t.x + TWN_W/2,
    y: t.y + TWN_H + 30,
    speed: 120,
    angle: 0,
    alive: true,
    flashTimer:0,
    // car fields (null until bought)
    car: null,
  };
}

function createCar(typeName, townIdx) {
  const def = VEHICLE_TYPES[typeName];
  const t = TOWNS[townIdx];
  return {
    type: typeName,
    x: t.x + TWN_W/2,
    y: t.y + TWN_H + 30,
    vx:0, vy:0,
    angle: -PI/2, // facing up (toward road)
    speed:0,
    maxSpeed: def.speed,
    accel: def.speed * 0.8,
    turnRate: 2.8,
    // Armor per facing
    frontArmor: def.armor, rearArmor: def.armor,
    leftArmor: def.armor, rightArmor: def.armor,
    maxArmor: def.armor,
    hull: def.hull, maxHull: def.hull,
    fuel: def.fuel, maxFuel: def.fuel,
    // Components
    engineHull: 100, tireHull: 100, fuelTankHull: 100,
    // Weapons: array of {type, ammo, fuel, heat}
    weapons: [],
    currentWeaponIdx: 0,
    fireTimer: 0,
    // visual
    w: def.w, h: def.h,
    alive: true, flashTimer:0,
  };
}

function getPlayerWeapon() {
  const car = player.car;
  if (!car || car.weapons.length === 0) return null;
  return car.weapons[car.currentWeaponIdx];
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
function startGame() {
  gameState = 'WALKING';
  currentTownIndex = 0;
  stats = { cash:500, odometer:0, enemiesDestroyed:0, totalCashEarned:0 };
  player = createWalkingPlayer(currentTownIndex);
  enemies = []; bullets = []; particles = []; droppedItems = [];
  garageTown = null;
}

// ═══════════════════════════════════════════════════════════
// UPDATE
// ═══════════════════════════════════════════════════════════
function update(dt) {
  if (gameState === 'TITLE' || gameState === 'GARAGE' || gameState === 'GAMEOVER') return;

  if (shakeTimer > 0) shakeTimer -= dt;
  if (damageFlashTimer > 0) damageFlashTimer -= dt;

  if (gameState === 'WALKING' || gameState === 'ARENA_PROMPT') updateWalking(dt);
  else if (gameState === 'DRIVING') {
    updateDriving(dt);
    updateEnemies(dt);
    updateBullets(dt);
    updateDroppedItems(dt);
    updateParticles(dt);
    checkTownEntry();
    if (!arenaActive) checkEnemySpawns(dt);
    if (arenaActive) checkArenaWave();
  }
}

// ── WALKING ──────────────────────────────────────────────
function updateWalking(dt) {
  const spd = player.speed;
  let dx = 0, dy = 0;
  if (keys['KeyW']||keys['ArrowUp'])    dy -= 1;
  if (keys['KeyS']||keys['ArrowDown'])  dy += 1;
  if (keys['KeyA']||keys['ArrowLeft'])  dx -= 1;
  if (keys['KeyD']||keys['ArrowRight']) dx += 1;
  if (dx !== 0 || dy !== 0) {
    const len = Math.sqrt(dx*dx+dy*dy);
    dx /= len; dy /= len;
    player.x += dx * spd * dt;
    player.y += dy * spd * dt;
    player.angle = Math.atan2(dy, dx);
  }

  // Clamp to world
  player.x = Math.max(20, Math.min(WORLD_W - 20, player.x));
  player.y = Math.max(20, Math.min(WORLD_H - 20, player.y));

  // Check garage zone entry
  const t = TOWNS[currentTownIndex];
  const gx = t.x + TWN_W/2 - 40, gy = t.y + TWN_H + 5;
  const gw = 80, gh = 60;
  if (player.x > gx && player.x < gx+gw && player.y > gy && player.y < gy+gh) {
    enterGarage();
  }

  // Check arena zone entry (New Denver only)
  if (currentTownIndex === ARENA_TOWN) {
    const ax = t.x + t.w/2 - 45, ay = t.y - 45;
    if (player.x > ax && player.x < ax+90 && player.y > ay && player.y < ay+40) {
      gameState = 'ARENA_PROMPT';
    } else if (gameState === 'ARENA_PROMPT') {
      gameState = 'WALKING'; // left the arena zone
    }
  }
}

// ── DRIVING ──────────────────────────────────────────────
function updateDriving(dt) {
  const car = player.car;
  if (!car || !car.alive) return;

  // Smoke if damaged
  if (car.hull < car.maxHull * 0.4 && Math.random() < 0.1) spawnSmokePuff(car.x, car.y);

  const throttle = (keys['KeyW']||keys['ArrowUp']) ? 1:0;
  const brake    = (keys['KeyS']||keys['ArrowDown']) ? 1:0;
  const turnL    = (keys['KeyA']||keys['ArrowLeft']) ? 1:0;
  const turnR    = (keys['KeyD']||keys['ArrowRight']) ? 1:0;

  // Engine damage reduces speed; cargo adds weight penalty
  const engineMult = car.engineHull < 50 ? 0.5 : 1.0;
  const cargoMax = VEHICLE_TYPES[car.type]?.cargo || 0;
  const cargoMult = cargoMax > 0 ? Math.max(0.5, 1 - (playerCargo / cargoMax) * 0.4) : 1.0;
  const maxSpd = car.maxSpeed * engineMult * cargoMult;
  const accel  = car.accel * engineMult * cargoMult;

  // Fuel consumption
  const onRoad = isOnRoad(car.x, car.y);
  const fuelRate = onRoad ? 1/50 : 1/25; // per pixel

  const speed = Math.sqrt(car.vx*car.vx + car.vy*car.vy);

  // Turning (speed-dependent)
  const turnFactor = Math.min(speed / 60, 1);
  car.angle += (turnR - turnL) * car.turnRate * turnFactor * dt;

  if (throttle && car.fuel > 0) {
    car.vx += Math.cos(car.angle) * accel * dt;
    car.vy += Math.sin(car.angle) * accel * dt;
    car.fuel -= fuelRate * Math.sqrt(car.vx*car.vx+car.vy*car.vy) * dt;
    car.fuel = Math.max(0, car.fuel);
  }
  if (brake) {
    car.vx *= Math.pow(0.3, dt);
    car.vy *= Math.pow(0.3, dt);
  }

  // Drag
  car.vx *= Math.pow(0.97, dt*60);
  car.vy *= Math.pow(0.97, dt*60);

  // Speed cap
  const v = Math.sqrt(car.vx*car.vx+car.vy*car.vy);
  if (v > maxSpd) { car.vx = car.vx/v*maxSpd; car.vy = car.vy/v*maxSpd; }

  // Tire blowout = spin
  if (car.tireHull <= 0 && Math.random() < 0.02) {
    car.angle += (Math.random()-0.5) * 0.8;
    car.vx *= 0.7; car.vy *= 0.7;
  }

  car.x += car.vx * dt;
  car.y += car.vy * dt;
  car.x = Math.max(10, Math.min(WORLD_W-10, car.x));
  car.y = Math.max(10, Math.min(WORLD_H-10, car.y));

  // Odometer
  stats.odometer += v * dt * 0.01;

  // Player RAM collision — damage enemies by ramming them
  for (const e of enemies) {
    if (!e.alive) continue;
    if (dist(car.x, car.y, e.x, e.y) < (car.w + e.w) / 2) {
      const ramDmg = Math.floor(v * 0.15 + (VEHICLE_TYPES[car.type]?.armor || 20) * 0.2);
      if (ramDmg > 5) {
        const angle = Math.atan2(e.y - car.y, e.x - car.x);
        applyDamageToCar(e, ramDmg, angle, false);
        applyDamageToCar(car, Math.floor(ramDmg * 0.3), normalizeAngle(angle + PI), true);
        spawnSparks((car.x + e.x) / 2, (car.y + e.y) / 2, 6);
        shakeTimer = 0.15; shakeIntensity = 5;
        // Push apart
        const pushAngle = Math.atan2(car.y - e.y, car.x - e.x);
        car.vx += Math.cos(pushAngle) * 30; car.vy += Math.sin(pushAngle) * 30;
        e.vx -= Math.cos(pushAngle) * 30; e.vy -= Math.sin(pushAngle) * 30;
      }
    }
  }

  // Fire timer
  car.fireTimer -= dt;
  if (car.fireTimer < 0) car.fireTimer = 0;

  car.flashTimer -= dt;
  if (car.flashTimer < 0) car.flashTimer = 0;

  // Fuel tank explosion
  if (car.fuelTankHull <= 0 && car.fuel <= 0) {
    destroyCar(car, true);
  }
}

// ═══════════════════════════════════════════════════════════
// ENEMIES
// ═══════════════════════════════════════════════════════════
function spawnEnemy() {
  // Pick a random road segment
  const seg = ROAD_SEGS[Math.floor(Math.random() * ROAD_SEGS.length)];
  const t = Math.random();
  let x, y;
  if (seg.x !== undefined) {
    // Vertical road
    const t0 = TOWNS[seg.from], t1 = TOWNS[seg.to];
    const minY = t0.y + TWN_H, maxY = t1.y;
    y = minY + (maxY-minY) * t;
    x = seg.x + (Math.random()-0.5) * 20;
  } else {
    // Horizontal road
    const t0 = TOWNS[seg.from], t1 = TOWNS[seg.to];
    const minX = t0.x + TWN_W, maxX = t1.x;
    x = minX + (maxX-minX) * t;
    y = seg.y + (Math.random()-0.5) * 20;
  }

  // Don't spawn too close to player
  if (player.car && dist(x, y, player.car.x, player.car.y) < 300) {
    return; // skip this spawn
  }

  const typeNames = ['RoadWarrior','Raider','Hunter','Ganger'];
  const type = typeNames[Math.floor(Math.random() * typeNames.length)];
  const def = makeEnemyDef(type);

  enemies.push({
    type,
    x, y,
    vx:0, vy:0,
    angle: Math.random() * PI * 2,
    speed: def.speed, accel: def.speed * 0.7,
    turnRate: 2.0,
    frontArmor: def.armor, rearArmor: def.armor,
    leftArmor: def.armor, rightArmor: def.armor,
    hull: def.hull, maxHull: def.hull,
    fuel: 999, maxFuel: 999,
    weapons: [{ type: def.weapon, ammo: def.weapon==='MachineGun' ? 200 : def.weapon==='Rockets' ? 10 : 0, fuel:0, heat:0 }],
    currentWeaponIdx: 0,
    fireTimer: Math.random() * 2,
    alive: true, flashTimer:0,
    w: def.w, h: def.h,
    color: def.color, dark: def.dark,
    cash: def.cash,
    behavior: def.behavior,
    stuckTimer:0, lastX:x, lastY:y,
  });
}

function updateEnemies(dt) {
  const car = player.car;
  if (!car) return;

  for (let i = enemies.length-1; i >= 0; i--) {
    const e = enemies[i];
    if (!e.alive) { enemies.splice(i,1); continue; }

    if (e.flashTimer > 0) e.flashTimer -= dt;

    // Smoke if damaged
    if (e.hull < e.maxHull * 0.5 && Math.random() < 0.06) spawnSmokePuff(e.x, e.y);

    const dx = car.x - e.x, dy = car.y - e.y;
    const d = Math.sqrt(dx*dx+dy*dy);
    const targetAngle = Math.atan2(dy, dx);

    // AI behavior
    if (e.behavior === 'patrol') {
      // Move toward player if close, else wander
      if (d < 400) {
        let a = normalizeAngle(targetAngle - e.angle);
        e.angle += Math.sign(a) * Math.min(Math.abs(a), e.turnRate * dt);
      } else {
        // Random wander
        if (Math.random() < 0.01) e.angle += (Math.random()-0.5)*0.5;
      }
    } else if (e.behavior === 'charge') {
      let a = normalizeAngle(targetAngle - e.angle);
      e.angle += Math.sign(a) * Math.min(Math.abs(a), e.turnRate*1.5 * dt);
    } else if (e.behavior === 'sniper') {
      // Keep distance
      if (d < 200) {
        let a = normalizeAngle(targetAngle + PI - e.angle);
        e.angle += Math.sign(a) * Math.min(Math.abs(a), e.turnRate * dt);
      } else if (d > 400) {
        let a = normalizeAngle(targetAngle - e.angle);
        e.angle += Math.sign(a) * Math.min(Math.abs(a), e.turnRate * dt);
      }
    } else if (e.behavior === 'pack') {
      // Stay near other enemies, chase player
      if (d < 500) {
        let a = normalizeAngle(targetAngle - e.angle);
        e.angle += Math.sign(a) * Math.min(Math.abs(a), e.turnRate * dt);
      }
    }

    // FLEE — when badly damaged, run away from player
    if (e.hull < e.maxHull * 0.3) {
      const fleeAngle = normalizeAngle(targetAngle + PI); // away from player
      let a = normalizeAngle(fleeAngle - e.angle);
      e.angle += Math.sign(a) * Math.min(Math.abs(a), e.turnRate * 1.5 * dt);
      // Faster flee speed
      e.vx += Math.cos(e.angle) * e.accel * 1.5 * dt;
      e.vy += Math.sin(e.angle) * e.accel * 1.5 * dt;
      if (Math.random() < 0.05) spawnSmokePuff(e.x, e.y);
    }

    const onRoad = isOnRoad(e.x, e.y);
    const maxSpd = onRoad ? e.speed : 40;

    e.vx += Math.cos(e.angle) * e.accel * dt;
    e.vy += Math.sin(e.angle) * e.accel * dt;
    e.vx *= Math.pow(0.96, dt*60);
    e.vy *= Math.pow(0.96, dt*60);

    const v = Math.sqrt(e.vx*e.vx+e.vy*e.vy);
    if (v > maxSpd) { e.vx = e.vx/v*maxSpd; e.vy = e.vy/v*maxSpd; }

    e.x += e.vx * dt;
    e.y += e.vy * dt;
    e.x = Math.max(10, Math.min(WORLD_W-10, e.x));
    e.y = Math.max(10, Math.min(WORLD_H-10, e.y));

    // Unstuck
    if (Math.abs(e.x-e.lastX)<1 && Math.abs(e.y-e.lastY)<1) {
      e.stuckTimer += dt;
      if (e.stuckTimer > 2) { e.angle += (Math.random()-0.5)*PI; e.stuckTimer=0; }
    } else e.stuckTimer = 0;
    e.lastX = e.x; e.lastY = e.y;

    // Fire
    e.fireTimer -= dt;
    const wpn = e.weapons[0];
    if (e.fireTimer <= 0 && d < 350 && Math.abs(normalizeAngle(targetAngle-e.angle)) < PI/6) {
      fireEnemyBullet(e, wpn);
      e.fireTimer = wpn.type === 'Rockets' ? 3.0 : 0.5;
    }

    // Ram behavior
    if (e.type === 'Raider' && d < 30) {
      applyRamDamage(e, car);
    }
  }
}

function fireEnemyBullet(e, wpn) {
  const def = WEAPON_TYPES[wpn.type];
  if (!def) return;
  if (def.type === 'mine' || def.type === 'oil' || def.type === 'smoke') return; // can't fire these actively

  const angle = e.angle + (Math.random()-0.5)*(def.spread||0.05);
  const ox = Math.cos(e.angle)*e.w/2, oy = Math.sin(e.angle)*e.w/2;
  bullets.push({
    x: e.x+ox, y: e.y+oy,
    vx: Math.cos(angle)*(def.bulletSpeed||400)+e.vx*0.3,
    vy: Math.sin(angle)*(def.bulletSpeed||400)+e.vy*0.3,
    isPlayer: false, damage: def.damage||5,
    life: 1.2, maxLife: 1.2, angle,
    weaponType: wpn.type
  });
  spawnMuzzleFlash(e.x+ox, e.y+oy, angle);
}

function applyRamDamage(e, car) {
  const speed = Math.sqrt(e.vx*e.vx+e.vy*e.vy);
  const dmg = Math.floor(speed * 0.3 + 10);
  const angle = Math.atan2(car.y-e.y, car.x-e.x);
  applyDamageToCar(car, dmg, angle, true);
  applyDamageToCar(e, dmg*0.5, normalizeAngle(angle+PI), false);
  shakeTimer = 0.3; shakeIntensity = 8;
  spawnSparks(car.x, car.y, 8);
}

// ═══════════════════════════════════════════════════════════
// BULLETS
// ═══════════════════════════════════════════════════════════
function fireWeapon() {
  const car = player.car;
  if (!car || !car.alive) return;
  if (car.fireTimer > 0) return;

  const wpn = getPlayerWeapon();
  if (!wpn) return;

  const def = WEAPON_TYPES[wpn.type];
  if (!def) return;

  car.fireTimer = 1 / (def.firesPerSec || 1);

  // Drop-type weapons
  if (def.drop) {
    const backX = car.x - Math.cos(car.angle)*car.w/2;
    const backY = car.y - Math.sin(car.angle)*car.w/2;
    if (def.type === 'mine') {
      droppedItems.push({ type:'mine', x:backX, y:backY, owner:'player', damage:def.damage, life:15, maxLife:15 });
      wpn.ammo--;
    } else if (def.type === 'oil') {
      droppedItems.push({ type:'oil', x:backX, y:backY, owner:'player', life:12, maxLife:12 });
      wpn.ammo--;
    } else if (def.type === 'smoke') {
      droppedItems.push({ type:'smoke', x:car.x, y:car.y, owner:'player', radius:60, life:6, maxLife:6 });
      wpn.fuel -= def.fuel;
    }
    return;
  }

  const ox = Math.cos(car.angle)*car.w/2, oy = Math.sin(car.angle)*car.w/2;

  if (def.type === 'flame') {
    for (let i = 0; i < 5; i++) {
      const spread = (Math.random()-0.5)*def.spread;
      const a = car.angle + spread;
      bullets.push({
        x: car.x+ox, y: car.y+oy,
        vx: Math.cos(a)*def.bulletSpeed + car.vx*0.2,
        vy: Math.sin(a)*def.bulletSpeed + car.vy*0.2,
        isPlayer:true, damage:def.damage, life:0.3, maxLife:0.3, angle:a, weaponType:'Flamethrower'
      });
    }
    wpn.fuel -= def.fuel;
    wpn.heat += def.heat;
  } else if (def.type === 'rocket') {
    bullets.push({
      x: car.x+ox, y: car.y+oy,
      vx: Math.cos(car.angle)*def.bulletSpeed + car.vx*0.2,
      vy: Math.sin(car.angle)*def.bulletSpeed + car.vy*0.2,
      isPlayer:true, damage:def.damage, life:1.5, maxLife:1.5, angle:car.angle, weaponType:'Rockets', isRocket:true
    });
    wpn.ammo--;
    wpn.heat += def.heat;
  } else {
    // Machine gun
    const spread = (Math.random()-0.5)*def.spread;
    const a = car.angle + spread;
    bullets.push({
      x: car.x+ox, y: car.y+oy,
      vx: Math.cos(a)*def.bulletSpeed + car.vx*0.2,
      vy: Math.sin(a)*def.bulletSpeed + car.vy*0.2,
      isPlayer:true, damage:def.damage, life:0.8, maxLife:0.8, angle:a, weaponType:'MachineGun'
    });
    wpn.ammo--;
    wpn.heat += def.heat;
  }

  // Heat management (overheat)
  if (wpn.heat > 100) {
    wpn.heat = 100;
    car.fireTimer = 1.0; // cooldown
  }
  spawnMuzzleFlash(car.x+ox, car.y+oy, car.angle);
}

function cycleWeapon() {
  const car = player.car;
  if (!car || car.weapons.length <= 1) return;
  car.currentWeaponIdx = (car.currentWeaponIdx + 1) % car.weapons.length;
}

function updateBullets(dt) {
  const car = player.car;
  for (let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;

    if (b.life <= 0 || b.x < 0 || b.x > WORLD_W || b.y < 0 || b.y > WORLD_H) {
      bullets.splice(i,1); continue;
    }

    // Smoke trail for rockets
    if (b.isRocket && Math.random() < 0.4) {
      particles.push({ type:'smoke', x:b.x, y:b.y, vx:(Math.random()-0.5)*20, vy:(Math.random()-0.5)*20-10,
        life:0.3, maxLife:0.3, size:4+Math.random()*4, color:'#666666' });
    }

    // Hit player
    if (!b.isPlayer && car && car.alive && dist(b.x,b.y,car.x,car.y) < car.w/2+4) {
      const angle = Math.atan2(car.y-b.y, car.x-b.x);
      applyDamageToCar(car, b.damage, angle, true);
      spawnSparks(b.x, b.y, 5);
      bullets.splice(i,1); continue;
    }

    // Hit enemies
    if (b.isPlayer) {
      let hit = false;
      for (const e of enemies) {
        if (!e.alive) continue;
        if (dist(b.x,b.y,e.x,e.y) < e.w/2+4) {
          const angle = Math.atan2(e.y-b.y, e.x-b.x);
          applyDamageToCar(e, b.damage, angle, false);
          spawnSparks(b.x, b.y, 5);
          hit = true; break;
        }
      }
      if (hit) { bullets.splice(i,1); continue; }
    }

    // Hit mines
    for (let j = droppedItems.length-1; j >= 0; j--) {
      const mine = droppedItems[j];
      if (mine.type !== 'mine') continue;
      if (dist(b.x,b.y,mine.x,mine.y) < 18) {
        // Trigger explosion
        droppedItems.splice(j,1);
        spawnExplosion(mine.x, mine.y, 15, false);
        // Damage nearby
        if (car && car.alive && dist(mine.x,mine.y,car.x,car.y) < 80) {
          applyDamageToCar(car, mine.damage, Math.atan2(car.y-mine.y,car.x-mine.x), true);
        }
        for (const e of enemies) {
          if (!e.alive) continue;
          if (dist(mine.x,mine.y,e.x,e.y) < 80) {
            applyDamageToCar(e, mine.damage, Math.atan2(e.y-mine.y,e.x-mine.x), false);
          }
        }
        bullets.splice(i,1); break;
      }
    }
  }
}

function updateDroppedItems(dt) {
  const car = player.car;
  for (let i = droppedItems.length-1; i >= 0; i--) {
    const d = droppedItems[i];
    d.life -= dt;
    if (d.life <= 0) { droppedItems.splice(i,1); continue; }

    // Oil slick - damage tires / cause spin
    if (d.type === 'oil' && car && car.alive) {
      if (dist(d.x,d.y,car.x,car.y) < 20) {
        if (Math.random() < 0.1) {
          car.angle += (Math.random()-0.5)*0.6;
          car.vx *= 0.8; car.vy *= 0.8;
        }
      }
    }

    // Smoke cloud - block enemy targeting
    if (d.type === 'smoke') {
      d.radius = Math.min(d.radius, d.radius + 20*dt);
    }

    // Mines - player/enemy contact
    if (d.type === 'mine' && d.owner === 'enemy') {
      if (car && car.alive && dist(d.x,d.y,car.x,car.y) < 18) {
        droppedItems.splice(i,1);
        spawnExplosion(d.x, d.y, 15, false);
        applyDamageToCar(car, d.damage, Math.atan2(car.y-d.y,car.x-d.x), true);
        continue;
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════
// DAMAGE SYSTEM
// ═══════════════════════════════════════════════════════════
function applyDamageToCar(car, dmg, angle, isPlayer) {
  // Determine which facing was hit
  let facing = 'front';
  const norm = ((angle % (PI*2)) + PI*2) % (PI*2);
  // car.angle is the direction the front faces
  const hitRel = normalizeAngle(norm - car.angle);
  if (hitRel > -PI/4 && hitRel <= PI/4) facing = 'front';
  else if (hitRel > PI/4 && hitRel <= 3*PI/4) facing = 'right';
  else if (hitRel > 3*PI/4 || hitRel <= -3*PI/4) facing = 'rear';
  else facing = 'left';

  let armor = car[facing+'Armor'];
  if (armor > 0) {
    const absorbed = Math.min(armor, dmg);
    car[facing+'Armor'] -= absorbed;
    dmg -= absorbed;
  }

  if (dmg > 0) {
    car.hull -= dmg;

    // Component damage (random when hull hit)
    if (Math.random() < 0.3) {
      const comps = ['engineHull','tireHull','fuelTankHull'];
      const comp = comps[Math.floor(Math.random()*comps.length)];
      car[comp] = Math.max(0, car[comp] - dmg * 5);
    }
  }

  car.flashTimer = 0.12;

  if (car.hull <= 0) {
    destroyCar(car, isPlayer);
  } else if (isPlayer) {
    shakeTimer = 0.15; shakeIntensity = 4;
    damageFlashTimer = 0.1;
  }
}

function destroyCar(car, isPlayer) {
  car.alive = false;
  car.hull = 0;
  spawnExplosion(car.x, car.y, car.type==='Semi'?40:25, false);
  shakeTimer = 0.6; shakeIntensity = 15;
  damageFlashTimer = 0.4;

  if (!isPlayer) {
    // Enemy destroyed
    stats.enemiesDestroyed++;
    stats.cash += car.cash || 50;
    stats.totalCashEarned += car.cash || 50;
    // Drop salvage
    const salvageVal = Math.floor((VEHICLE_TYPES[car.type]||{salvage:50}).salvage * 0.3);
    if (salvageVal > 0) {
      droppedItems.push({ type:'salvage', x:car.x, y:car.y, value:salvageVal, life:20, maxLife:20 });
    }
    // Drop cargo (chance based on enemy type)
    if (player.car && Math.random() < 0.25) {
      const cargoSpace = (VEHICLE_TYPES[player.car.type]?.cargo || 0) - playerCargo;
      if (cargoSpace > 0) {
        const cargoAmt = Math.min(cargoSpace, 1 + Math.floor(Math.random() * 3));
        playerCargo += cargoAmt;
        // Visual feedback
        effects.push({ type:'pickup', x:car.x, y:car.y, t:0.5, maxT:0.5 });
      }
    }
  } else {
    // Player died
    setTimeout(() => { gameState = 'GAMEOVER'; }, 800);
  }
}

// ═══════════════════════════════════════════════════════════
// GARAGE SYSTEM
// ═══════════════════════════════════════════════════════════
function enterGarage() {
  gameState = 'GARAGE';
  garageTown = currentTownIndex;
  garageTab = 0;
  garageSel = 0;
}

function exitGarage(exitToDriving) {
  gameState = exitToDriving ? 'DRIVING' : 'WALKING';
  garageTown = null;
}

function handleGarageInput(code) {
  if (code === 'Escape') { exitGarage(player.car ? true : false); return; }
  if (code === 'Digit1') { garageTab=0; garageSel=0; return; }
  if (code === 'Digit2') { garageTab=1; garageSel=0; return; }
  if (code === 'Digit3') { garageTab=2; garageSel=0; return; }
  if (code === 'Digit4') { garageTab=3; garageSel=0; return; }
  if (code === 'Digit5') { garageTab=4; garageSel=0; return; }

  const tabCounts = [6, 3, 1, 1, 1]; // BUY=6vehicles, SELL=3options, REPAIR=1, FUEL=1, STATS=1
  const maxSel = tabCounts[garageTab]-1;

  if (code === 'ArrowUp'   || code === 'KeyW') garageSel = Math.max(0, garageSel-1);
  if (code === 'ArrowDown' || code === 'KeyS') garageSel = Math.min(maxSel, garageSel+1);
  if (code === 'Enter' || code === 'Space') doGarageAction();
}

function doGarageAction() {
  const t = TOWNS[garageTown];
  const price = (base, mod) => Math.ceil(base * mod);

  if (garageTab === 0) {
    // BUY / INSTALL
    const typeNames = ['Cycle','Compact','Sedan','Pickup','Van','Semi'];
    const typeName = typeNames[garageSel];
    if (!typeName) return;

    if (!player.car) {
      // Buy new car
      const cost = price(VEHICLE_TYPES[typeName].cost, t.weaponsMod);
      if (stats.cash < cost) return;
      stats.cash -= cost;
      player.car = createCar(typeName, garageTown);
      exitGarage(true);
    } else {
      // Buy weapon / upgrade
      const wpnSel = garageSel; // 0-5 = weapons
      const wpnNames = ['machineGun','flamethrower','rockets','mines','oilSlick','smoke'];
      const wpnName = wpnNames[wpnSel];
      const def = WEAPON_TYPES[wpnName.charAt(0).toUpperCase()+wpnName.slice(1)];
      const cost = price(BASE_PRICES[wpnName], t.weaponsMod);
      if (!def || stats.cash < cost) return;

      const slotNeeded = def.slot || 1;
      const usedSlots = player.car.weapons.reduce((s,w) => s + (WEAPON_TYPES[w.type]?.slot||1), 0);
      const carSlots = (VEHICLE_TYPES[player.car.type]||{slots:1}).slots;
      if (usedSlots + slotNeeded > carSlots) return; // no slots

      stats.cash -= cost;
      player.car.weapons.push({
        type: def.name||wpnName.charAt(0).toUpperCase()+wpnName.slice(1),
        ammo: def.ammo||0, fuel: def.type==='flame'||def.type==='smoke' ? (def.fuel||0)*10 : 0,
        heat:0
      });
    }
  } else if (garageTab === 1) {
    // SELL
    if (garageSel === 0 && player.car) {
      // Sell car for salvage
      const salvage = Math.floor((VEHICLE_TYPES[player.car.type]||{salvage:0}).salvage * 0.25);
      stats.cash += salvage;
      player.car = null;
    } else if (garageSel === 1) {
      // Sell salvage
      let salvageVal = 0;
      for (let i = droppedItems.length-1; i >= 0; i--) {
        if (droppedItems[i].type === 'salvage') {
          salvageVal += droppedItems[i].value;
          droppedItems.splice(i,1);
        }
      }
      if (salvageVal > 0) {
        const sellPrice = price(salvageVal * 0.5, t.partsMod);
        stats.cash += sellPrice;
      }
    } else if (garageSel === 2) {
      // Sell cargo
      if (playerCargo > 0 && player.car) {
        const cargoMax = VEHICLE_TYPES[player.car.type]?.cargo || 0;
        if (cargoMax > 0) {
          const cargoValue = Math.floor(playerCargo * 20 * t.partsMod);
          stats.cash += cargoValue;
          playerCargo = 0;
        }
      }
    }
  } else if (garageTab === 2) {
    // REPAIR
    const car = player.car;
    if (!car) return;
    const hullDmg = car.maxHull - car.hull;
    const frontDmg = car.maxArmor - car.frontArmor;
    const rearDmg  = car.maxArmor - car.rearArmor;
    const leftDmg  = car.maxArmor - car.leftArmor;
    const rightDmg = car.maxArmor - car.rightArmor;
    const engineDmg = 100 - car.engineHull;
    const tireDmg   = 100 - car.tireHull;
    const fuelDmg   = 100 - car.fuelTankHull;
    const totalDmg = hullDmg + frontDmg + rearDmg + leftDmg + rightDmg + engineDmg + tireDmg + fuelDmg;
    const cost = price(Math.ceil(totalDmg * 0.5), t.partsMod);
    if (stats.cash < cost) return;
    stats.cash -= cost;
    car.hull = car.maxHull;
    car.frontArmor = car.maxArmor; car.rearArmor = car.maxArmor;
    car.leftArmor = car.maxArmor; car.rightArmor = car.maxArmor;
    car.engineHull = 100; car.tireHull = 100; car.fuelTankHull = 100;
  } else if (garageTab === 3) {
    // FUEL
    const car = player.car;
    if (!car) return;
    const fuelNeeded = car.maxFuel - car.fuel;
    if (fuelNeeded <= 0) return;
    const cost = price(Math.ceil(fuelNeeded * 0.4), t.fuelMod);
    if (stats.cash < cost) return;
    stats.cash -= cost;
    car.fuel = car.maxFuel;
    car.fuelTankHull = 100; // refueling also patches tank
  } else if (garageTab === 4) {
    // STATS — just viewing, no action
  }
}

// ═══════════════════════════════════════════════════════════
// TOWN ENTRY (DRIVING)
// ═══════════════════════════════════════════════════════════
function checkTownEntry() {
  if (!player.car) return;
  for (let i = 0; i < TOWNS.length; i++) {
    const t = TOWNS[i];
    if (player.car.x > t.x && player.car.x < t.x+t.w &&
        player.car.y > t.y && player.car.y < t.y+t.h) {
      // Enter town → back to walking
      currentTownIndex = i;
      player.x = t.x + TWN_W/2;
      player.y = t.y + TWN_H + 30;
      player.angle = -PI/2;
      player.car = null;
      gameState = 'WALKING';
      // Clear enemies
      enemies = [];
      return;
    }
  }
}

function checkEnemySpawns(dt) {
  enemySpawnTimer -= dt;
  if (enemySpawnTimer <= 0) {
    const alive = enemies.filter(e=>e.alive).length;
    if (alive < 4) spawnEnemy();
    enemySpawnTimer = ENEMY_SPAWN_INTERVAL + Math.random()*4;
  }
}

// ═══════════════════════════════════════════════════════════
// ARENA SYSTEM
// ═══════════════════════════════════════════════════════════
function startArena() {
  if (!player.car) {
    // Show "need car" feedback — just flash the HUD
    return;
  }
  // Enter arena combat
  gameState = 'DRIVING';
  arenaActive = true;
  arenaWave = 1;
  arenaKills = 0;
  enemies = [];
  // Spawn arena enemies for wave 1
  for (let i = 0; i < 2; i++) spawnArenaEnemy('RoadWarrior');
  // Place player car at arena start
  player.car.x = TOWNS[ARENA_TOWN].x + TWN_W/2;
  player.car.y = TOWNS[ARENA_TOWN].y - 200;
  player.car.vx = 0; player.car.vy = 0;
}

function spawnArenaEnemy(type) {
  const def = makeEnemyDef(type);
  const t = TOWNS[ARENA_TOWN];
  const angle = Math.random() * PI * 2;
  const radius = 300 + Math.random() * 200;
  const x = t.x + TWN_W/2 + Math.cos(angle) * radius;
  const y = t.y + TWN_H/2 + Math.sin(angle) * radius;
  enemies.push({
    type, x, y,
    vx:0, vy:0,
    angle: Math.atan2(t.y + TWN_H/2 - y, t.x + TWN_W/2 - x),
    speed: def.speed * 1.2, accel: def.speed * 0.8,
    turnRate: 2.0,
    frontArmor: def.armor, rearArmor: def.armor,
    leftArmor: def.armor, rightArmor: def.armor,
    hull: def.hull * 1.5, maxHull: def.hull * 1.5,
    fuel: 999, maxFuel: 999,
    weapons: [{ type: def.weapon, ammo: def.weapon==='MachineGun' ? 300 : def.weapon==='Rockets' ? 15 : 0, fuel:0, heat:0 }],
    currentWeaponIdx: 0, fireTimer: Math.random() * 2,
    alive: true, flashTimer:0,
    w: def.w, h: def.h, color: def.color, dark: def.dark,
    cash: def.cash * 2, behavior: def.behavior,
    stuckTimer:0, lastX:x, lastY:y,
  });
}

function checkArenaWave() {
  if (!arenaActive) return;
  const alive = enemies.filter(e=>e.alive).length;
  if (alive === 0) {
    arenaWave++;
    if (arenaWave > 5) {
      // Victory!
      arenaActive = false;
      const reward = arenaWave * 200;
      stats.cash += reward;
      stats.totalCashEarned += reward;
      gameState = 'WALKING';
      player.car = null;
      return;
    }
    // Spawn next wave
    const count = Math.min(arenaWave, 4);
    for (let i = 0; i < count; i++) {
      const types = ['RoadWarrior','Raider','Hunter','Ganger'];
      spawnArenaEnemy(types[Math.floor(Math.random()*types.length)]);
    }
  }
}

function renderArenaPrompt() {
  // Apple IIe style: simple text overlay
  ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.font='bold 28px monospace'; ctx.fillStyle='#FFCC00'; ctx.textAlign='center';
  ctx.fillText('[ ARENA ]', canvas.width/2, canvas.height/2-50);
  ctx.font='14px monospace'; ctx.fillStyle='#00FF00';
  ctx.fillText('WAVE '+arenaWave+' — ENEMIES: '+enemies.filter(e=>e.alive).length, canvas.width/2, canvas.height/2-15);
  ctx.fillStyle='#888888';
  ctx.fillText('5 WAVES TO WIN', canvas.width/2, canvas.height/2+5);
  ctx.fillStyle='#FFCC00';
  ctx.fillText('ENTER: FIGHT   ESC: LEAVE', canvas.width/2, canvas.height/2+35);
  ctx.textAlign='left';
}

// ═══════════════════════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════════════════════
function spawnExplosion(x, y, count, isRammer) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random()*PI*2;
    const speed = 50+Math.random()*150;
    particles.push({
      type:'fire', x, y,
      vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed,
      life:0.3+Math.random()*0.5, maxLife:0.8, size:3+Math.random()*5,
      color: isRammer ? '#cc44ff' : '#ff6600'
    });
  }
  for (let i = 0; i < count/2; i++) {
    const angle = Math.random()*PI*2;
    const speed = 20+Math.random()*60;
    particles.push({
      type:'smoke', x, y,
      vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed-20,
      life:0.6+Math.random()*0.8, maxLife:1.4, size:8+Math.random()*12, color:'#555555'
    });
  }
  for (let i = 0; i < count/3; i++) {
    const angle = Math.random()*PI*2;
    const speed = 80+Math.random()*200;
    particles.push({
      type:'debris', x, y,
      vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed,
      life:0.5+Math.random()*0.6, maxLife:1.1, size:2+Math.random()*4, color:'#aa8833',
      rot:Math.random()*PI*2, rotSpd:(Math.random()-0.5)*10
    });
  }
}

function spawnSparks(x, y, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random()*PI*2;
    const speed = 30+Math.random()*100;
    particles.push({
      type:'spark', x, y,
      vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed,
      life:0.1+Math.random()*0.2, maxLife:0.3, size:1+Math.random()*2, color:'#ffcc00'
    });
  }
}

function spawnMuzzleFlash(x, y, angle) {
  for (let i = 0; i < 3; i++) {
    const a = angle + (Math.random()-0.5)*0.3;
    const speed = 50+Math.random()*80;
    particles.push({
      type:'spark', x, y,
      vx:Math.cos(a)*speed, vy:Math.sin(a)*speed,
      life:0.05+Math.random()*0.08, maxLife:0.13, size:2+Math.random()*2, color:'#ffff88'
    });
  }
}

function spawnSmokePuff(x, y) {
  particles.push({
    type:'smoke', x, y,
    vx:(Math.random()-0.5)*20, vy:-10-Math.random()*20,
    life:0.4+Math.random()*0.4, maxLife:0.8, size:5+Math.random()*8, color:'#444444'
  });
}

function updateParticles(dt) {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx*dt; p.y += p.vy*dt;
    p.life -= dt;
    if (p.type === 'debris') { p.vy += 200*dt; p.rot += p.rotSpd*dt; }
    if (p.type === 'smoke') { p.size += 15*dt; p.vx *= Math.pow(0.95, dt*60); }
    if (p.life <= 0) particles.splice(i,1);
  }
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function render() {
  if (!ctx) return;
  ctx.fillStyle = C.void;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (gameState === 'TITLE') { renderTitle(); return; }

  // Camera
  if (gameState === 'WALKING' || gameState === 'TOWN' || gameState === 'ARENA_PROMPT') {
    const t = TOWNS[currentTownIndex];
    cam.x = t.x + TWN_W/2 - canvas.width/2;
    cam.y = t.y + TWN_H/2 - canvas.height/2;
  } else if (gameState === 'DRIVING' && player.car) {
    cam.x = player.car.x - canvas.width/2;
    cam.y = player.car.y - canvas.height/2;
  }

  let sx = 0, sy = 0;
  if (shakeTimer > 0) { sx = (Math.random()-0.5)*shakeIntensity; sy = (Math.random()-0.5)*shakeIntensity; }

  ctx.save();
  ctx.translate(-cam.x+sx, -cam.y+sy);

  renderWorld();
  renderDroppedItems();
  renderParticles();
  renderBullets();
  renderEnemies();
  if (player.car) renderCar(player.car, 'player', player.car.flashTimer>0);
  renderPlayer();
  if (gameState === 'DRIVING') renderHUD();

  ctx.restore();

  if (damageFlashTimer > 0) {
    ctx.fillStyle = `rgba(255,0,0,${damageFlashTimer*0.3})`;
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }

  if (gameState === 'WALKING' || gameState === 'TOWN' || gameState === 'ARENA_PROMPT') renderWalkingHUD();
  if (gameState === 'GARAGE')  renderGarageUI();
  if (gameState === 'PAUSED')  renderPaused();
  if (gameState === 'GAMEOVER') renderGameOver();
  if (gameState === 'ARENA_PROMPT') renderArenaPrompt();
}

// ── WORLD ─────────────────────────────────────────────────
function renderWorld() {
  // Apple IIe: pure black background (no grass texture)
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, WORLD_W, WORLD_H);

  // Roads as simple colored lines
  for (const seg of ROAD_SEGS) renderRoadSegment(seg);

  // Towns as simple outlined boxes
  for (const t of TOWNS) renderTown(t);
}

function renderRoadSegment(seg) {
  // Apple IIe style: roads as simple thick lines
  const t0 = TOWNS[seg.from], t1 = TOWNS[seg.to];

  // Road surface - thick line
  ctx.strokeStyle = '#333333';
  ctx.lineWidth = ROAD_WIDTH;
  ctx.lineCap = 'butt';
  ctx.beginPath();
  if (seg.x !== undefined) {
    const top = Math.min(t0.y+TWN_H, t1.y+TWN_H);
    const bot = Math.max(t0.y, t1.y);
    ctx.moveTo(seg.x, top); ctx.lineTo(seg.x, bot);
  } else {
    const left = Math.min(t0.x+TWN_W, t1.x+TWN_W);
    const right = Math.max(t0.x, t1.x);
    ctx.moveTo(left, seg.y); ctx.lineTo(right, seg.y);
  }
  ctx.stroke();

  // Road edge lines - white
  ctx.strokeStyle = '#FFFFFF';
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.7;
  if (seg.x !== undefined) {
    ctx.beginPath(); ctx.moveTo(seg.x-ROAD_WIDTH/2+4, Math.min(t0.y+TWN_H,t1.y+TWN_H)); ctx.lineTo(seg.x-ROAD_WIDTH/2+4, Math.max(t0.y,t1.y)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(seg.x+ROAD_WIDTH/2-4, Math.min(t0.y+TWN_H,t1.y+TWN_H)); ctx.lineTo(seg.x+ROAD_WIDTH/2-4, Math.max(t0.y,t1.y)); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(Math.min(t0.x+TWN_W,t1.x+TWN_W), seg.y-ROAD_WIDTH/2+4); ctx.lineTo(Math.max(t0.x,t1.x), seg.y-ROAD_WIDTH/2+4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(Math.min(t0.x+TWN_W,t1.x+TWN_W), seg.y+ROAD_WIDTH/2-4); ctx.lineTo(Math.max(t0.x,t1.x), seg.y+ROAD_WIDTH/2-4); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function renderTown(t) {
  // Apple IIe style: simple outlined box, no gradients/glow
  ctx.fillStyle = '#001100';
  ctx.fillRect(t.x, t.y, t.w, t.h);

  ctx.strokeStyle = '#888888';
  ctx.lineWidth = 2;
  ctx.strokeRect(t.x, t.y, t.w, t.h);

  // Town name in green text
  ctx.font = 'bold 12px monospace';
  ctx.fillStyle = '#00FF00';
  ctx.textAlign = 'center';
  ctx.fillText(t.name, t.x+t.w/2, t.y+t.h/2);
  ctx.textAlign = 'left';

  // Garage zone (white dashed box)
  if (gameState === 'WALKING' || gameState === 'GARAGE') {
    const gx = t.x+t.w/2-40, gy = t.y+t.h+5;
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = 1;
    ctx.setLineDash([4,4]);
    ctx.strokeRect(gx, gy, 80, 60);
    ctx.setLineDash([]);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GARAGE', gx+40, gy+32);
    ctx.textAlign = 'left';
  }

  // ARENA zone in New Denver (index 2)
  if (t === TOWNS[ARENA_TOWN] && gameState === 'WALKING') {
    const ax = t.x + t.w/2 - 45, ay = t.y - 40;
    ctx.strokeStyle = '#FFCC00';
    ctx.lineWidth = 1;
    ctx.setLineDash([4,4]);
    ctx.strokeRect(ax, ay, 90, 35);
    ctx.setLineDash([]);
    ctx.fillStyle = '#FFCC00';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('[ARENA]', t.x+t.w/2, ay+14);
    ctx.fillStyle = '#AA8800';
    ctx.font = '8px monospace';
    ctx.fillText('ENTER TO FIGHT', t.x+t.w/2, ay+27);
    ctx.textAlign = 'left';
  }
}

// ── CARS ──────────────────────────────────────────────────
function renderCar(car, type, flash) {
  // Apple IIe style: simple colored rectangles
  ctx.save();
  ctx.translate(car.x, car.y);
  ctx.rotate(car.angle);

  const w = car.w, h = car.h;
  // Player = green, Enemy = red
  ctx.fillStyle = flash ? '#FFFFFF' : (type==='player' ? '#00FF00' : '#FF0000');
  ctx.fillRect(-w/2, -h/2, w, h);

  // Darker stripe for depth (simple)
  ctx.fillStyle = type==='player' ? '#006600' : '#880000';
  ctx.fillRect(-w/2, -h/2, w*0.25, h);

  ctx.restore();
}

function renderPlayer() {
  if (gameState !== 'WALKING') return;
  // Apple IIe style: simple square player
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.fillStyle = '#00FF00';
  ctx.fillRect(-5, -5, 10, 10);
  ctx.restore();
}

function renderEnemies() {
  for (const e of enemies) {
    if (!e.alive) continue;
    renderCar(e, 'enemy', e.flashTimer>0);
  }
}

function renderBullets() {
  // Apple IIe style: simple white dots/dashes
  for (const b of bullets) {
    const fade = b.life / b.maxLife;
    ctx.globalAlpha = fade;
    ctx.fillStyle = '#FFFFFF';
    if (b.isRocket) {
      // Rockets as small orange dashes
      ctx.fillStyle = '#FFCC00';
      ctx.fillRect(b.x-5, b.y-2, 10, 4);
    } else {
      // Bullets as small white dots
      ctx.fillRect(b.x-2, b.y-2, 4, 4);
    }
    ctx.globalAlpha = 1;
  }
}

function renderDroppedItems() {
  // Simplified Apple IIe style: basic shapes, no glow
  for (const d of droppedItems) {
    if (d.type === 'salvage') {
      ctx.globalAlpha = Math.min(1, d.life/5);
      ctx.fillStyle = '#FFCC00';
      ctx.fillRect(d.x-5, d.y-3, 10, 6);
      ctx.globalAlpha = 1;
    } else if (d.type === 'mine') {
      ctx.fillStyle = '#FF0000';
      ctx.fillRect(d.x-5, d.y-5, 10, 10);
    } else if (d.type === 'oil') {
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = '#333333';
      ctx.fillRect(d.x-10, d.y-6, 20, 12);
      ctx.globalAlpha = 1;
    } else if (d.type === 'smoke') {
      ctx.globalAlpha = (d.life/d.maxLife)*0.4;
      ctx.fillStyle = '#888888';
      ctx.beginPath(); ctx.arc(d.x,d.y,8,0,PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
}

function renderParticles() {
  // Apple IIe: simple pixel particles, no glow effects
  for (const p of particles) {
    const alpha = Math.max(0, p.life/p.maxLife);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color || '#FFCC00';
    const size = Math.max(1, Math.floor(p.size * alpha));
    ctx.fillRect(p.x - size/2, p.y - size/2, size, size);
    ctx.globalAlpha = 1;
  }
}

// ═══════════════════════════════════════════════════════════
// HUD — Apple IIe style: simple text-based readout
// ═══════════════════════════════════════════════════════════
function renderHUD() {
  const car = player.car;
  if (!car) return;
  const pad = 10;
  const speed = Math.sqrt(car.vx*car.vx+car.vy*car.vy);

  // Black panel background
  ctx.fillStyle='#000000';
  ctx.fillRect(0, 0, canvas.width, 60);
  ctx.strokeStyle='#333333'; ctx.lineWidth=1;
  ctx.strokeRect(0, 0, canvas.width, 60);

  ctx.font='11px monospace'; ctx.textAlign='left';

  // Speed
  ctx.fillStyle='#00FF00';
  ctx.fillText('SPD: '+Math.floor(speed*0.6)+' MPH', pad, pad+14);

  // Odometer
  ctx.fillText('ODOM: '+stats.odometer.toFixed(1)+' MI', pad+130, pad+14);

  // Hull & Fuel as simple text
  const hullPct = Math.ceil((car.hull/car.maxHull)*100);
  const fuelPct = Math.floor((car.fuel/car.maxFuel)*100);
  ctx.fillStyle='#00FF00';
  ctx.fillText('HULL: '+hullPct+'%', pad, pad+28);
  ctx.fillText('FUEL: '+fuelPct+'%', pad+130, pad+28);

  // Armor (all 4 facings as numbers)
  ctx.fillStyle='#00AA00';
  ctx.fillText('F:'+car.frontArmor+' R:'+car.rearArmor+' L:'+car.leftArmor+' R:'+car.rightArmor, pad, pad+42);

  // Cash and kills
  ctx.fillStyle='#FFCC00';
  ctx.fillText('$'+stats.cash, pad+350, pad+14);
  ctx.fillStyle='#00AA00';
  ctx.fillText('KILLS:'+stats.enemiesDestroyed, pad+420, pad+14);

  // Weapon info
  const wpn = getPlayerWeapon();
  if (wpn) {
    ctx.fillStyle='#00FF00';
    const wName = WEAPON_DISPLAY[wpn.type] || wpn.type;
    ctx.fillText('WPN:'+wName, pad+350, pad+28);
    if (wpn.ammo !== undefined) ctx.fillText('AMO:'+(wpn.ammo||0), pad+430, pad+28);
    else if (wpn.fuel !== undefined) ctx.fillText('FUEL:'+(wpn.fuel||0), pad+430, pad+28);
    const heat = Math.floor((wpn.heat||0));
    ctx.fillStyle=heat>80?'#FF0000':'#00AA00';
    ctx.fillText('HEAT:'+heat+'%', pad+350, pad+42);
  } else {
    ctx.fillStyle='#666666';
    ctx.fillText('NO WEAPON', pad+350, pad+28);
  }

  // Minimap (top-right)
  renderMinimap(canvas.width - 180 - pad, pad, 180, 60);
}

function drawArmorBar(x,y,w,h,pct,max) {
  pct = Math.max(0,Math.min(1,pct/max));
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(x,y,w,h);
  const col = pct>0.6?'#4488ff':pct>0.3?'#ffcc00':'#ff3300';
  ctx.fillStyle=col; ctx.fillRect(x+1,y+1,(w-2)*pct,h-2);
  ctx.strokeStyle='#333333'; ctx.lineWidth=1; ctx.strokeRect(x,y,w,h);
}

function drawBar(x,y,w,h,pct,color) {
  pct = Math.max(0,Math.min(1,pct));
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(x,y,w,h);
  ctx.fillStyle=color; ctx.fillRect(x+1,y+1,(w-2)*pct,h-2);
  ctx.strokeStyle='#333333'; ctx.lineWidth=1; ctx.strokeRect(x,y,w,h);
}

function renderMinimap(px,py,mw,mh) {
  // Apple IIe style: simple black minimap with green/amber markers
  ctx.fillStyle='#001100'; ctx.fillRect(px,py,mw,mh);
  ctx.strokeStyle='#333333'; ctx.lineWidth=1; ctx.strokeRect(px,py,mw,mh);
  ctx.font='8px monospace'; ctx.fillStyle='#006600'; ctx.textAlign='left';
  ctx.fillText('MAP', px+3, py+10);

  const sx = mw/WORLD_W, sy = mh/WORLD_H;

  // Roads - white lines
  ctx.strokeStyle='#555555'; ctx.lineWidth=1;
  for (const seg of ROAD_SEGS) {
    ctx.beginPath();
    if (seg.x !== undefined) {
      ctx.moveTo(px+seg.x*sx, py+Math.min(TOWNS[seg.from].y+TWN_H,TOWNS[seg.to].y+TWN_H)*sy);
      ctx.lineTo(px+seg.x*sx, py+Math.max(TOWNS[seg.from].y,TOWNS[seg.to].y)*sy);
    } else {
      ctx.moveTo(px+Math.min(TOWNS[seg.from].x+TWN_W,TOWNS[seg.to].x+TWN_W)*sx, py+seg.y*sy);
      ctx.lineTo(px+Math.max(TOWNS[seg.from].x,TOWNS[seg.to].x)*sx, py+seg.y*sy);
    }
    ctx.stroke();
  }

  // Towns - gray squares
  for (const t of TOWNS) {
    ctx.fillStyle='#888888';
    ctx.fillRect(px+t.x*sx-2, py+t.y*sy-2, 4, 4);
  }

  // Enemies - red dots
  for (const e of enemies) {
    if (!e.alive) continue;
    ctx.fillStyle='#FF0000';
    ctx.fillRect(px+e.x*sx-1, py+e.y*sy-1, 3, 3);
  }

  // Player - green dot
  if (player.car) {
    ctx.fillStyle='#00FF00';
    ctx.fillRect(px+player.car.x*sx-2, py+player.car.y*sy-2, 4, 4);
  }

  ctx.textAlign='left';
}

function renderWalkingHUD() {
  const pad = 10;
  ctx.fillStyle='rgba(10,10,10,0.85)'; ctx.fillRect(pad,pad,220,100);
  ctx.strokeStyle=C.hudBorder; ctx.lineWidth=2; ctx.strokeRect(pad,pad,220,100);

  ctx.font='bold 14px monospace'; ctx.fillStyle=C.gold; ctx.textAlign='left';
  ctx.fillText('$'+stats.cash, pad+10, pad+20);

  const t = TOWNS[currentTownIndex];
  if (gameState === 'ARENA_PROMPT') {
    ctx.font='bold 13px monospace'; ctx.fillStyle='#ff4400';
    ctx.fillText('ARENA ZONE', pad+10, pad+38);
    ctx.font='11px monospace'; ctx.fillStyle=C.text;
    ctx.fillText('ENTER: Fight for glory', pad+10, pad+54);
    ctx.fillStyle=C.textDim;
    ctx.font='10px monospace';
    ctx.fillText('ESC: Leave arena', pad+10, pad+70);
  } else if (gameState === 'WALKING' && player.car === null) {
    ctx.font='bold 13px monospace'; ctx.fillStyle=C.town;
    ctx.fillText('IN ' + t.name, pad+10, pad+38);
    ctx.font='11px monospace'; ctx.fillStyle=C.text;
    ctx.fillText('Walk to GARAGE zone', pad+10, pad+54);
    ctx.fillStyle=C.textDim;
    ctx.font='10px monospace';
    ctx.fillText('WASD to move', pad+10, pad+70);
    ctx.fillText('Find the garage', pad+10, pad+84);
  } else {
    ctx.font='11px monospace'; ctx.fillStyle=C.text;
    ctx.fillText('WALKING', pad+10, pad+38);
    ctx.fillStyle=C.textDim;
    ctx.fillText('At: '+t.name, pad+10, pad+54);
    ctx.fillText('Find the GARAGE', pad+10, pad+70);
  }
  ctx.textAlign='left';
}

// ═══════════════════════════════════════════════════════════
// GARAGE UI — Apple IIe style
// ═══════════════════════════════════════════════════════════
function renderGarageUI() {
  const pw = 520, ph = 420;
  const px = (canvas.width-pw)/2, py = (canvas.height-ph)/2;

  ctx.fillStyle='rgba(0,0,0,0.92)'; ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle='#000000'; ctx.fillRect(px,py,pw,ph);
  ctx.strokeStyle='#00FF00'; ctx.lineWidth=2; ctx.strokeRect(px,py,pw,ph);

  const t = TOWNS[garageTown];
  ctx.font='bold 18px monospace'; ctx.fillStyle='#00FF00'; ctx.textAlign='center';
  ctx.fillText(t.name+' GARAGE', px+pw/2, py+28);
  ctx.font='11px monospace'; ctx.fillStyle='#888888';
  ctx.fillText(`F:${t.fuelMod.toFixed(1)}x  P:${t.partsMod.toFixed(1)}x  W:${t.weaponsMod.toFixed(1)}x`, px+pw/2, py+46);

  // Tabs
  const tabs=['BUY','SELL','REPAIR','FUEL','STATS'];
  const tabW=pw/5;
  tabs.forEach((tab,i)=>{
    ctx.fillStyle=garageTab===i?'#003300':'#001100';
    ctx.fillRect(px+i*tabW, py+54, tabW, 28);
    ctx.strokeStyle=garageTab===i?'#00FF00':'#333333';
    ctx.lineWidth=1; ctx.strokeRect(px+i*tabW, py+54, tabW, 28);
    ctx.fillStyle=garageTab===i?'#00FF00':'#666666';
    ctx.font='bold 11px monospace'; ctx.textAlign='center';
    ctx.fillText('['+(i+1)+'] '+tab, px+i*tabW+tabW/2, py+72);
  });

  ctx.strokeStyle='#333333'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(px+10, py+88); ctx.lineTo(px+pw-10, py+88); ctx.stroke();

  ctx.textAlign='left';

  if (garageTab===0) renderGarageBuy();
  else if (garageTab===1) renderGarageSell();
  else if (garageTab===2) renderGarageRepair();
  else if (garageTab===3) renderGarageFuel();
  else if (garageTab===4) renderGarageStats();

  ctx.font='10px monospace'; ctx.fillStyle='#444444'; ctx.textAlign='center';
  ctx.fillText('WASD/Arrows: Navigate   ENTER/SPACE: Select   1-5: Tabs   ESC: Exit', canvas.width/2, py+ph+18);
  ctx.textAlign='left';
}

function renderGarageBuy() {
  const t = TOWNS[garageTown];
  const px2 = (canvas.width-520)/2, py2 = (canvas.height-420)/2;

  if (!player.car) {
    // Show vehicle list
    const types = ['Cycle','Compact','Sedan','Pickup','Van','Semi'];
    ctx.font='12px monospace'; ctx.fillStyle=C.text; ctx.fillText('SELECT A VEHICLE:', px2+15, py2+112);
    types.forEach((type,i)=>{
      const def = VEHICLE_TYPES[type];
      const cost = Math.ceil(def.cost * t.weaponsMod);
      const y = py2+130+i*38;
      const sel = garageSel===i;
      if (sel) {
        ctx.fillStyle='#1a1a33'; ctx.fillRect(px2+10, y-13, 500, 33);
        ctx.strokeStyle=C.town; ctx.lineWidth=1; ctx.strokeRect(px2+10, y-13, 500, 33);
      }
      ctx.fillStyle=def.armor>50?'#4488ff':def.armor>25?'#44cc44':'#cccc44';
      ctx.fillRect(px2+18, y-5, 10, 10);
      ctx.fillStyle=sel?C.text:C.textDim;
      ctx.font='bold 12px monospace'; ctx.fillText(type, px2+35, y+4);
      ctx.font='10px monospace';
      ctx.fillText(`SPD:${def.speed} ARM:${def.armor} HULL:${def.hull} FUEL:${def.fuel} SLOTS:${def.slots}`, px2+100, y+4);
      ctx.fillStyle=stats.cash>=cost?C.gold:'#664444';

    const carSlots = (VEHICLE_TYPES[player.car.type]||{slots:1}).slots;
    weapons.forEach((wn,i)=>{
      const def = WEAPON_TYPES[wn];
      const cost = Math.ceil(BASE_PRICES[wn.toLowerCase()] * t.weaponsMod);
      const y = py2+130+i*38;
      const sel = garageSel===i;
      const canBuy = stats.cash>=cost && slotsUsed+(def.slot||1)<=carSlots;
      if (sel) {
        ctx.fillStyle='#1a1a33'; ctx.fillRect(px2+10, y-13, 500, 33);
        ctx.strokeStyle=C.town; ctx.lineWidth=1; ctx.strokeRect(px2+10, y-13, 500, 33);
      }

      ctx.fillRect(px2+18, y-5, 10, 10);
      ctx.fillStyle=sel?C.text:C.textDim;
      ctx.font='bold 12px monospace'; ctx.fillText(WEAPON_DISPLAY[wn], px2+35, y+4);

function renderGarageRepair() {
  const t = TOWNS[garageTown];
  const px2 = (canvas.width-520)/2, py2 = (canvas.height-420)/2;
  const car = player.car;

  if (!car) {
    ctx.font='14px monospace'; ctx.fillStyle=C.textDim;
    ctx.fillText('Buy a car first!', px2+200, py2+200);
    return;
  }

  const hullDmg = car.maxHull - car.hull;
  const armorDmg = (car.maxArmor-car.frontArmor)+(car.maxArmor-car.rearArmor)+(car.maxArmor-car.leftArmor)+(car.maxArmor-car.rightArmor);
  const compDmg = (100-car.engineHull)+(100-car.tireHull)+(100-car.fuelTankHull);
  const totalDmg = hullDmg+armorDmg+compDmg;
  const cost = Math.ceil(totalDmg * 0.5 * t.partsMod);

  ctx.font='12px monospace'; ctx.fillStyle=C.text;
  ctx.fillText('REPAIR SHOP', px2+15, py2+112);

  ctx.font='11px monospace';
  ctx.fillStyle=C.textDim; ctx.fillText('Hull Damage:', px2+25, py2+140);
  ctx.fillStyle=car.hull<car.maxHull?C.healthRed:C.text; ctx.fillText('-'+hullDmg, px2+150, py2+140);

  ctx.fillStyle=C.textDim; ctx.fillText('Armor Damage:', px2+25, py2+160);
  ctx.fillStyle=armorDmg>0?C.healthYellow:C.text; ctx.fillText('-'+armorDmg, px2+150, py2+160);

  ctx.fillStyle=C.textDim; ctx.fillText('Component Damage:', px2+25, py2+180);
  ctx.fillStyle=compDmg>0?C.healthYellow:C.text; ctx.fillText('-'+compDmg+'%', px2+150, py2+180);

  ctx.fillStyle=C.textDim; ctx.fillText('TOTAL:', px2+25, py2+200);
  ctx.fillStyle=C.text; ctx.fillText(totalDmg+' points', px2+150, py2+200);

  // Repair button
  const ry = py2+220;
  const canRepair = totalDmg > 0 && stats.cash >= cost;
  ctx.fillStyle=canRepair?'#1a2a1a':'#1a1a1a';
  ctx.fillRect(px2+15, ry, 490, 60);
  ctx.strokeStyle=canRepair?C.healthGreen:'#333333';
  ctx.lineWidth=2; ctx.strokeRect(px2+15, ry, 490, 60);
  ctx.fillStyle=canRepair?C.text:'#555555'; ctx.font='bold 14px monospace';
  ctx.fillText('REPAIR ALL — $'+cost, px2+25, ry+25);
  ctx.font='11px monospace'; ctx.fillStyle='#888888';
  ctx.fillText('ENTER to repair', px2+25, ry+48);

  ctx.fillStyle=C.gold; ctx.font='bold 13px monospace';
  ctx.fillText('Cash: $'+stats.cash, px2+15, py2+400);
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function dist(x1,y1,x2,y2){ return Math.sqrt((x2-x1)*(x2-x1)+(y2-y1)*(y2-y1)); }
function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }
function normalizeAngle(a){ while(a>PI)a-=PI*2; while(a<-PI)a+=PI*2; return a; }

function isOnRoad(x,y) {
  for (const seg of ROAD_SEGS) {
    const t0 = TOWNS[seg.from], t1 = TOWNS[seg.to];
    if (seg.x !== undefined) {
      // Vertical
      const top = Math.min(t0.y+TWN_H, t1.y+TWN_H);
      const bot = Math.max(t0.y, t1.y);
      if (Math.abs(x-seg.x) < ROAD_WIDTH/2+5 && y > top && y < bot) return true;
    } else {
      // Horizontal
      const left = Math.min(t0.x+TWN_W, t1.x+TWN_W);
      const right = Math.max(t0.x, t1.x);
      if (Math.abs(y-seg.y) < ROAD_WIDTH/2+5 && x > left && x < right) return true;
    }
  }
  return false;
}

// Fix: WEAPON_LIST lookup
const WEAPON_DISPATCH = {
  MachineGun:'M', Flamethrower:'F', Rockets:'R', Mines:'M', OilSlick:'O', Smoke:'S', Ram:'R'
};

// ═══════════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════════
function gameLoop(ts) {
  const dt = Math.min((ts-lastTime)/1000, 0.05);
  lastTime = ts;
  update(dt);
  render();
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(ts=>{ lastTime=ts; gameLoop(ts); });
