<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUTODUEL</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0d0d; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

// ═══════════════════════════════════════════════════════════
// AUTODUEL — HTML5 Canvas Remake
// ═══════════════════════════════════════════════════════════

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ═══════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════

const WORLD_W = 3000;
const WORLD_H = 2000;
const ROAD_W = 80;
const PI = Math.PI;

// ═══════════════════════════════════════════════════════════
// COLORS
// ═══════════════════════════════════════════════════════════

const C = {
  void: '#0d0d0d',
  asphalt: '#2d2d2d',
  roadMark: '#f0c000',
  roadEdge: '#ffffff',
  grass: '#1a3d1a',
  player: '#00aa00',
  playerDark: '#006600',
  enemy: '#cc2200',
  enemyDark: '#881100',
  enemyRammer: '#aa00cc',
  enemyRammerDark: '#660088',
  bullet: '#ffff00',
  spark: '#ff8800',
  town: '#4444aa',
  townGlow: '#6666cc',
  hudBg: '#111111',
  hudBorder: '#333333',
  healthGreen: '#00cc44',
  healthYellow: '#cccc00',
  healthRed: '#cc0000',
  fuelBlue: '#0088ff',
  text: '#f0f0f0',
  textDim: '#888888',
  scrap: '#aa8833',
  gold: '#ffd700',
};

// ═══════════════════════════════════════════════════════════
// ROAD NETWORK
// ═══════════════════════════════════════════════════════════

const ROADS = [
  [[200, 500], [600, 500], [900, 550], [1200, 800]],
  [[200, 500], [200, 900], [350, 1200], [600, 1600]],
  [[1200, 800], [900, 1100], [700, 1300], [600, 1600]],
  [[200, 500], [100, 300], [300, 200], [500, 350], [600, 500], [200, 500]],
];

// Towns (economy balanced: Barren Rock = cheap fuel, Dusty Spur = cheap guns)
const TOWNS = [
  {
    name: 'BARREN ROCK',
    x: 120, y: 420, w: 180, h: 160,
    buy: { fuel: 15, repair: 80, armor: 140, gun: 250 },
    sell: { scrap: 20, cargo: 50 },
    desc: 'Cheap fuel, pricey arms'
  },
  {
    name: 'DUSTY SPUR',
    x: 1110, y: 710, w: 180, h: 160,
    buy: { fuel: 50, repair: 90, armor: 200, gun: 130 },
    sell: { scrap: 28, cargo: 65 },
    desc: 'Cheap arms, pricey fuel'
  },
  {
    name: 'NEW DENVER',
    x: 510, y: 1510, w: 200, h: 160,
    buy: { fuel: 30, repair: 85, armor: 160, gun: 180 },
    sell: { scrap: 22, cargo: 55 },
    desc: 'Balanced market'
  },
];

// ═══════════════════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════════════════

const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) {
    e.preventDefault();
  }
  if (e.code === 'Escape' && gameState === 'TOWN') {
    gameState = 'PLAYING';
    townUI = null;
  }
  if (e.code === 'Escape' && gameState === 'PLAYING') {
    gameState = 'PAUSED';
  } else if (e.code === 'Escape' && gameState === 'PAUSED') {
    gameState = 'PLAYING';
  }
  if (e.code === 'Space' && gameState === 'TITLE') {
    startGame();
  }
  if (e.code === 'Space' && gameState === 'GAMEOVER') {
    respawnPlayer();
  }
  if (gameState === 'TOWN') {
    if (e.code === 'Digit1') townTab = 0;
    if (e.code === 'Digit2') townTab = 1;
    if (e.code === 'Digit3') townTab = 2;
    if (e.code === 'ArrowUp' || e.code === 'KeyW') {
      if (townSel > 0) townSel--;
    }
    if (e.code === 'ArrowDown' || e.code === 'KeyS') {
      if (townSel < getTownTabLength(townTab) - 1) townSel++;
    }
    if (e.code === 'Enter' || e.code === 'Space') {
      doTownAction(townTab, townSel);
    }
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ═══════════════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════════════

let gameState = 'TITLE';
let lastTime = 0;
let shakeTimer = 0;
let shakeIntensity = 0;
let damageFlashTimer = 0;

let player = {};
let enemies = [];
let bullets = [];
let scraps = [];
let effects = [];
let particles = []; // NEW: particle system

let townUI = null;
let townTab = 0;
let townSel = 0;
let currentTown = null;

let cam = { x: 0, y: 0 };

let credits = 500;
let cargo = 0;
let scrapCount = 0;
let gunLevel = 1;
let armorCount = 0;

let respawnTimer = 0;
let score = 0;
let enemiesDestroyed = 0;

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════

function startGame() {
  gameState = 'PLAYING';
  credits = 500;
  cargo = 0;
  scrapCount = 0;
  gunLevel = 1;
  armorCount = 0;
  scraps = [];
  effects = [];
  particles = [];
  bullets = [];
  enemies = [];
  respawnTimer = 0;
  score = 0;
  enemiesDestroyed = 0;

  resetPlayer();
  spawnInitialEnemies();
}

function resetPlayer() {
  player = {
    x: 220, y: 500,
    vx: 0, vy: 0,
    angle: 0,
    speed: 0,
    maxSpeed: 200,
    accel: 120,
    turnRate: 2.5,
    armor: 100,
    maxArmor: 100,
    hull: 100,
    maxHull: 100,
    fuel: 100,
    maxFuel: 100,
    fireTimer: 0,
    fireRate: 0.25,
    gunDamage: 8,
    alive: true,
    flashTimer: 0,
  };
}

function respawnPlayer() {
  let nearest = TOWNS[0];
  let nearestDist = Infinity;
  for (const t of TOWNS) {
    const d = dist(player.x, player.y, t.x + t.w/2, t.y + t.h/2);
    if (d < nearestDist) { nearestDist = d; nearest = t; }
  }
  player.x = nearest.x + nearest.w/2;
  player.y = nearest.y + nearest.h/2;
  player.vx = 0; player.vy = 0;
  player.hull = player.maxHull;
  player.armor = player.maxArmor;
  player.fuel = player.maxFuel;
  player.alive = true;
  credits = Math.max(0, credits - 50);
  scraps = [];
  bullets = [];
  enemies = [];
  particles = [];
  effects = [];
  spawnInitialEnemies();
  gameState = 'PLAYING';
}

function spawnInitialEnemies() {
  for (let i = 0; i < 3; i++) spawnEnemy();
}

function spawnEnemy() {
  const roadIdx = Math.floor(Math.random() * ROADS.length);
  const road = ROADS[roadIdx];
  const segIdx = Math.floor(Math.random() * (road.length - 1));
  const t = Math.random();
  const sx = road[segIdx][0] + (road[segIdx+1][0] - road[segIdx][0]) * t;
  const sy = road[segIdx][1] + (road[segIdx+1][1] - road[segIdx][1]) * t;

  if (dist(sx, sy, player.x, player.y) < 400) {
    return spawnEnemy();
  }

  // 30% chance of Rammer type
  const isRammer = Math.random() < 0.3;

  const baseEnemy = {
    x: sx, y: sy,
    vx: 0, vy: 0,
    angle: Math.random() * PI * 2,
    speed: isRammer ? 200 : 150,
    accel: isRammer ? 100 : 80,
    turnRate: isRammer ? 1.2 : 2.0,
    armor: isRammer ? 80 : 50,
    hull: isRammer ? 60 : 50,
    maxHull: isRammer ? 60 : 50,
    alive: true,
    fireTimer: Math.random() * 1.5,
    fireRate: isRammer ? 1.5 : 0.5,
    gunDamage: isRammer ? 5 : 10,
    flashTimer: 0,
    targetAngle: 0,
    stuckTimer: 0,
    lastX: sx, lastY: sy,
    type: isRammer ? 'rammer' : 'shooter',
    scrapReward: isRammer ? 4 : 3,
  };

  enemies.push(baseEnemy);
}

// ═══════════════════════════════════════════════════════════
// PARTICLE SYSTEM
// ═══════════════════════════════════════════════════════════

function spawnExplosionParticles(x, y, count, isRammer) {
  // Fire/sparks
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * PI * 2;
    const speed = 50 + Math.random() * 150;
    const life = 0.3 + Math.random() * 0.5;
    const size = 3 + Math.random() * 5;
    particles.push({
      type: 'fire',
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life, maxLife: life,
      size,
      color: isRammer ? '#cc44ff' : '#ff6600',
    });
  }
  // Smoke
  for (let i = 0; i < count / 2; i++) {
    const angle = Math.random() * PI * 2;
    const speed = 20 + Math.random() * 60;
    const life = 0.6 + Math.random() * 0.8;
    particles.push({
      type: 'smoke',
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 20,
      life, maxLife: life,
      size: 8 + Math.random() * 12,
      color: '#555555',
    });
  }
  // Debris
  for (let i = 0; i < count / 3; i++) {
    const angle = Math.random() * PI * 2;
    const speed = 80 + Math.random() * 200;
    const life = 0.5 + Math.random() * 0.6;
    particles.push({
      type: 'debris',
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life, maxLife: life,
      size: 2 + Math.random() * 4,
      color: '#aa8833',
      rot: Math.random() * PI * 2,
      rotSpd: (Math.random() - 0.5) * 10,
    });
  }
}

function spawnSparkParticles(x, y, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * PI * 2;
    const speed = 30 + Math.random() * 100;
    const life = 0.1 + Math.random() * 0.2;
    particles.push({
      type: 'spark',
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life, maxLife: life,
      size: 1 + Math.random() * 2,
      color: '#ffcc00',
    });
  }
}

function spawnBulletTrail(x, y, angle) {
  const speed = 20;
  particles.push({
    type: 'trail',
    x: x - Math.cos(angle) * 10,
    y: y - Math.sin(angle) * 10,
    vx: -Math.cos(angle) * speed + (Math.random() - 0.5) * 20,
    vy: -Math.sin(angle) * speed + (Math.random() - 0.5) * 20,
    life: 0.08 + Math.random() * 0.08,
    maxLife: 0.15,
    size: 2 + Math.random() * 2,
    color: '#ffff88',
  });
}

function spawnSmokePuff(x, y) {
  particles.push({
    type: 'smoke',
    x, y,
    vx: (Math.random() - 0.5) * 20,
    vy: -10 - Math.random() * 20,
    life: 0.4 + Math.random() * 0.4,
    maxLife: 0.8,
    size: 5 + Math.random() * 8,
    color: '#444444',
  });
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.type === 'debris') {
      p.vy += 200 * dt; // gravity
      p.rot += p.rotSpd * dt;
    }
    if (p.type === 'smoke') {
      p.size += 15 * dt;
      p.vx *= Math.pow(0.95, dt * 60);
    }
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ═══════════════════════════════════════════════════════════
// UPDATE
// ═══════════════════════════════════════════════════════════

function update(dt) {
  if (gameState !== 'PLAYING') return;

  if (shakeTimer > 0) shakeTimer -= dt;
  if (damageFlashTimer > 0) damageFlashTimer -= dt;

  updatePlayer(dt);
  updateEnemies(dt);
  updateBullets(dt);
  updateScraps(dt);
  updateEffects(dt);
  updateParticles(dt);
  checkTownEntry();
  checkEnemySpawns();
}

function updatePlayer(dt) {
  if (!player.alive) {
    respawnTimer -= dt;
    if (respawnTimer <= 0) gameState = 'GAMEOVER';
    return;
  }

  if (player.flashTimer > 0) player.flashTimer -= dt;

  // Smoke when damaged
  if (player.hull < player.maxHull * 0.4 && Math.random() < 0.1) {
    spawnSmokePuff(player.x, player.y);
  }

  const throttle = (keys['KeyW'] || keys['ArrowUp']) ? 1 : 0;
  const brake = (keys['KeyS'] || keys['ArrowDown']) ? 1 : 0;
  const turnL = (keys['KeyA'] || keys['ArrowLeft']) ? 1 : 0;
  const turnR = (keys['KeyD'] || keys['ArrowRight']) ? 1 : 0;

  const speed = Math.sqrt(player.vx * player.vx + player.vy * player.vy);

  const turnFactor = Math.min(speed / 80, 1);
  player.angle += (turnR - turnL) * player.turnRate * turnFactor * dt;

  const onRoad = isOnRoad(player.x, player.y);
  const maxSpd = onRoad ? player.maxSpeed : 60;
  const accel = onRoad ? player.accel : player.accel * 0.4;

  if (throttle && player.fuel > 0) {
    player.vx += Math.cos(player.angle) * accel * dt;
    player.vy += Math.sin(player.angle) * accel * dt;
    player.fuel -= 8 * dt;
    player.fuel = Math.max(0, player.fuel);
  }
  if (brake) {
    player.vx *= Math.pow(0.5, dt);
    player.vy *= Math.pow(0.5, dt);
  }

  player.vx *= Math.pow(0.96, dt * 60);
  player.vy *= Math.pow(0.96, dt * 60);

  const v = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
  if (v > maxSpd) {
    player.vx = (player.vx / v) * maxSpd;
    player.vy = (player.vy / v) * maxSpd;
  }

  player.x += player.vx * dt;
  player.y += player.vy * dt;

  player.x = clamp(player.x, 20, WORLD_W - 20);
  player.y = clamp(player.y, 20, WORLD_H - 20);

  player.fireTimer -= dt;
  if ((keys['Space']) && player.fireTimer <= 0 && player.fuel > 0) {
    fireBullet(player, true);
    player.fireTimer = player.fireRate;
  }
}

function updateEnemies(dt) {
  for (const e of enemies) {
    if (!e.alive) continue;
    if (e.flashTimer > 0) e.flashTimer -= dt;

    // Smoke for damaged rammers
    if (e.type === 'rammer' && e.hull < e.maxHull * 0.5 && Math.random() < 0.08) {
      spawnSmokePuff(e.x, e.y);
    }

    const dx = player.x - e.x;
    const dy = player.y - e.y;
    const d = Math.sqrt(dx*dx + dy*dy);
    const targetAngle = Math.atan2(dy, dx);

    let angleDiff = normalizeAngle(targetAngle - e.angle);
    const turnAmount = Math.min(Math.abs(angleDiff), e.turnRate * dt);
    e.angle += Math.sign(angleDiff) * turnAmount;

    const onRoad = isOnRoad(e.x, e.y);
    const maxSpd = onRoad ? e.speed : 60;

    if (d > 60) {
      e.vx += Math.cos(e.angle) * e.accel * dt;
      e.vy += Math.sin(e.angle) * e.accel * dt;
    }

    e.vx *= Math.pow(0.96, dt * 60);
    e.vy *= Math.pow(0.96, dt * 60);

    const v = Math.sqrt(e.vx * e.vx + e.vy * e.vy);
    if (v > maxSpd) {
      e.vx = (e.vx / v) * maxSpd;
      e.vy = (e.vy / v) * maxSpd;
    }

    e.x += e.vx * dt;
    e.y += e.vy * dt;

    e.x = clamp(e.x, 20, WORLD_W - 20);
    e.y = clamp(e.y, 20, WORLD_H - 20);

    if (Math.abs(e.x - e.lastX) < 1 && Math.abs(e.y - e.lastY) < 1) {
      e.stuckTimer += dt;
      if (e.stuckTimer > 2) {
        e.angle += (Math.random() - 0.5) * PI;
        e.stuckTimer = 0;
      }
    } else {
      e.stuckTimer = 0;
    }
    e.lastX = e.x; e.lastY = e.y;

    // Shooters fire, rammers just ram
    e.fireTimer -= dt;
    if (e.type === 'shooter' && e.fireTimer <= 0 && d < 350 && Math.abs(angleDiff) < PI/6) {
      fireBullet(e, false);
      e.fireTimer = e.fireRate;
    }
  }
}

function fireBullet(shooter, isPlayer) {
  const speed = 500;
  const spread = (Math.random() - 0.5) * 0.05;
  const angle = shooter.angle + spread;
  const ox = Math.cos(shooter.angle) * 20;
  const oy = Math.sin(shooter.angle) * 20;

  bullets.push({
    x: shooter.x + ox,
    y: shooter.y + oy,
    vx: Math.cos(angle) * speed + shooter.vx * 0.3,
    vy: Math.sin(angle) * speed + shooter.vy * 0.3,
    isPlayer,
    damage: isPlayer ? shooter.gunDamage : (shooter.type === 'rammer' ? 5 : 10),
    life: 0.8,
    maxLife: 0.8,
    angle,
  });

  effects.push({ type: 'flash', x: shooter.x + ox, y: shooter.y + oy, t: 0.08, maxT: 0.08 });
  spawnSparkParticles(shooter.x + ox, shooter.y + oy, 3);
  spawnBulletTrail(shooter.x + ox, shooter.y + oy, angle);
}

function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;

    // Trail particle
    if (Math.random() < 0.5) {
      spawnBulletTrail(b.x, b.y, b.angle);
    }

    if (b.life <= 0) { bullets.splice(i, 1); continue; }

    if (!b.isPlayer && player.alive) {
      if (dist(b.x, b.y, player.x, player.y) < 18) {
        applyDamageToCar(player, b.damage, true);
        spawnSparkParticles(b.x, b.y, 5);
        bullets.splice(i, 1);
        continue;
      }
    }

    if (b.isPlayer) {
      for (const e of enemies) {
        if (!e.alive) continue;
        if (dist(b.x, b.y, e.x, e.y) < 16) {
          applyDamageToCar(e, b.damage, false);
          spawnSparkParticles(b.x, b.y, 5);
          bullets.splice(i, 1);
          break;
        }
      }
    }

    if (b.x < 0 || b.x > WORLD_W || b.y < 0 || b.y > WORLD_H) {
      bullets.splice(i, 1);
    }
  }
}

function applyDamageToCar(car, dmg, isPlayer) {
  if (car.armor > 0) {
    const absorbed = Math.min(car.armor, dmg);
    car.armor -= absorbed;
    dmg -= absorbed;
  }
  if (dmg > 0) {
    car.hull -= dmg;
  }
  car.flashTimer = 0.1;

  if (car.hull <= 0) {
    car.alive = false;
    car.hull = 0;
    if (!isPlayer) {
      const reward = car.scrapReward || 3;
      const count = reward + Math.floor(Math.random() * 2);
      for (let i = 0; i < count; i++) {
        scraps.push({
          x: car.x + (Math.random() - 0.5) * 40,
          y: car.y + (Math.random() - 0.5) * 40,
          angle: Math.random() * PI * 2,
          rotSpd: (Math.random() - 0.5) * 3,
          life: 12,
          value: 1,
        });
      }
      spawnExplosionParticles(car.x, car.y, 20, car.type === 'rammer');
      effects.push({ type: 'explosion', x: car.x, y: car.y, t: 0.5, maxT: 0.5 });
      score += car.type === 'rammer' ? 150 : 100;
      enemiesDestroyed++;
    } else {
      spawnExplosionParticles(car.x, car.y, 30, false);
      effects.push({ type: 'explosion', x: car.x, y: car.y, t: 0.8, maxT: 0.8 });
      shakeTimer = 0.6; shakeIntensity = 15;
      damageFlashTimer = 0.3;
      respawnTimer = 2.0;
    }
  } else if (isPlayer) {
    shakeTimer = 0.15; shakeIntensity = 5;
    damageFlashTimer = 0.1;
  }
}

function updateScraps(dt) {
  for (let i = scraps.length - 1; i >= 0; i--) {
    const s = scraps[i];
    s.angle += s.rotSpd * dt;
    s.life -= dt;
    if (s.life <= 0) { scraps.splice(i, 1); continue; }

    if (player.alive && dist(s.x, s.y, player.x, player.y) < 30) {
      scrapCount++;
      effects.push({ type: 'pickup', x: s.x, y: s.y, t: 0.3, maxT: 0.3 });
      scraps.splice(i, 1);
    }
  }
}

function updateEffects(dt) {
  for (let i = effects.length - 1; i >= 0; i--) {
    effects[i].t -= dt;
    if (effects[i].t <= 0) effects.splice(i, 1);
  }
}

function checkTownEntry() {
  for (const t of TOWNS) {
    const cx = t.x + t.w/2, cy = t.y + t.h/2;
    if (player.x > t.x && player.x < t.x + t.w &&
        player.y > t.y && player.y < t.y + t.h) {
      enterTown(t);
      return;
    }
  }
}

function checkEnemySpawns() {
  const alive = enemies.filter(e => e.alive).length;
  if (alive < 3) spawnEnemy();
}

// ═══════════════════════════════════════════════════════════
// TOWN SYSTEM
// ═══════════════════════════════════════════════════════════

function enterTown(town) {
  gameState = 'TOWN';
  currentTown = town;
  townTab = 0;
  townSel = 0;
  townUI = town;
  player.vx = 0; player.vy = 0;
}

function getTownTabLength(tab) {
  if (tab === 0) return 4;
  if (tab === 1) return 2;
  return 1;
}

function doTownAction(tab, sel) {
  if (!currentTown) return;
  if (tab === 0) {
    const items = [
      { key: 'fuel', name: 'Fuel Can (+20)', price: currentTown.buy.fuel },
      { key: 'repair', name: 'Repair Kit (Full)', price: currentTown.buy.repair },
      { key: 'armor', name: 'Armor Plate (+30)', price: currentTown.buy.armor },
      { key: 'gun', name: 'Machine Gun (+DMG)', price: currentTown.buy.gun },
    ];
    const item = items[sel];
    if (!item) return;
    if (credits < item.price) return;
    credits -= item.price;
    if (item.key === 'fuel') {
      player.fuel = Math.min(player.maxFuel, player.fuel + 20);
    } else if (item.key === 'repair') {
      player.hull = player.maxHull;
      player.armor = player.maxArmor;
    } else if (item.key === 'armor') {
      armorCount++;
      player.maxArmor = 100 + armorCount * 30;
      player.armor = player.maxArmor;
    } else if (item.key === 'gun') {
      if (gunLevel < 3) gunLevel++;
      player.gunDamage = 8 + (gunLevel - 1) * 5;
    }
  } else if (tab === 1) {
    if (sel === 0 && scrapCount > 0) {
      credits += scrapCount * currentTown.sell.scrap;
      scrapCount = 0;
    } else if (sel === 1 && cargo > 0) {
      credits += cargo * currentTown.sell.cargo;
      cargo = 0;
    }
  } else if (tab === 2) {
    if (credits >= 50) {
      credits -= 50;
      player.hull = player.maxHull;
      player.armor = player.maxArmor;
      player.fuel = player.maxFuel;
    }
  }
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════

function render() {
  ctx.fillStyle = C.void;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (gameState === 'TITLE') {
    renderTitle();
    return;
  }

  cam.x = player.x - canvas.width/2;
  cam.y = player.y - canvas.height/2;

  let sx = 0, sy = 0;
  if (shakeTimer > 0) {
    sx = (Math.random() - 0.5) * shakeIntensity;
    sy = (Math.random() - 0.5) * shakeIntensity;
  }
  ctx.save();
  ctx.translate(-cam.x + sx, -cam.y + sy);

  renderWorld();
  renderScraps();
  renderParticles();
  renderBullets();
  renderEnemies();
  renderPlayer();
  renderEffects();

  ctx.restore();

  // Damage flash overlay
  if (damageFlashTimer > 0) {
    ctx.fillStyle = `rgba(255,0,0,${damageFlashTimer * 0.3})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  renderHUD();

  if (gameState === 'TOWN') renderTownUI();
  if (gameState === 'PAUSED') renderPaused();
  if (gameState === 'GAMEOVER') renderGameOver();
}

function renderTitle() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Animated scanlines
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  for (let y = 0; y < canvas.height; y += 4) {
    ctx.fillRect(0, y, canvas.width, 2);
  }

  // Animated road lines in background
  const time = Date.now() / 1000;
  ctx.strokeStyle = '#1a3d1a';
  ctx.lineWidth = 80;
  ctx.globalAlpha = 0.3;
  ctx.beginPath();
  ctx.moveTo(0, canvas.height * 0.6);
  ctx.lineTo(canvas.width, canvas.height * 0.6);
  ctx.stroke();
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center';

  // Title glow
  ctx.shadowColor = '#ff4400';
  ctx.shadowBlur = 30;
  ctx.font = 'bold 80px monospace';
  ctx.fillStyle = '#ff4400';
  ctx.fillText('AUTODUEL', canvas.width/2, canvas.height/2 - 100);
  ctx.shadowBlur = 0;

  ctx.font = '18px monospace';
  ctx.fillStyle = '#888888';
  ctx.fillText('A Top-Down Vehicular Combat Racing Game', canvas.width/2, canvas.height/2 - 50);
  ctx.fillStyle = '#555555';
  ctx.fillText('Original: Origin Systems, 1984 — Web Remake', canvas.width/2, canvas.height/2 - 25);

  // Blinking start
  if (Math.floor(time * 2) % 2 === 0) {
    ctx.font = 'bold 26px monospace';
    ctx.fillStyle = '#f0c000';
    ctx.fillText('PRESS SPACE TO START', canvas.width/2, canvas.height/2 + 40);
  }

  ctx.font = '14px monospace';
  ctx.fillStyle = '#666666';
  ctx.fillText('WASD / Arrows — Drive   |   SPACE — Fire   |   ESC — Pause', canvas.width/2, canvas.height/2 + 90);
  ctx.fillStyle = '#444444';
  ctx.fillText('Drive into blue town zones to trade. Destroy enemies for scrap.', canvas.width/2, canvas.height/2 + 120);
  ctx.fillText('Purple enemies are Rammers — fast, armored, deadly.', canvas.width/2, canvas.height/2 + 138);

  ctx.textAlign = 'left';
}

function renderWorld() {
  ctx.fillStyle = C.grass;
  ctx.fillRect(0, 0, WORLD_W, WORLD_H);

  for (const road of ROADS) {
    drawRoad(road);
  }

  for (const t of TOWNS) {
    drawTown(t);
  }
}

function drawRoad(waypoints) {
  for (let i = 0; i < waypoints.length - 1; i++) {
    const [x1, y1] = waypoints[i];
    const [x2, y2] = waypoints[i+1];

    ctx.strokeStyle = C.asphalt;
    ctx.lineWidth = ROAD_W;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();

    ctx.strokeStyle = C.roadMark;
    ctx.lineWidth = 3;
    ctx.setLineDash([20, 20]);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.setLineDash([]);

    const angle = Math.atan2(y2 - y1, x2 - x1);
    const perpX = Math.cos(angle + PI/2);
    const perpY = Math.sin(angle + PI/2);
    const edgeOff = ROAD_W/2 - 4;

    ctx.strokeStyle = C.roadEdge;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.5;

    ctx.beginPath();
    ctx.moveTo(x1 + perpX * edgeOff, y1 + perpY * edgeOff);
    ctx.lineTo(x2 + perpX * edgeOff, y2 + perpY * edgeOff);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(x1 - perpX * edgeOff, y1 - perpY * edgeOff);
    ctx.lineTo(x2 - perpX * edgeOff, y2 - perpY * edgeOff);
    ctx.stroke();

    ctx.globalAlpha = 1;
  }
}

function drawTown(t) {
  ctx.fillStyle = C.townGlow;
  ctx.globalAlpha = 0.15 + Math.sin(Date.now() / 500) * 0.05;
  ctx.fillRect(t.x - 10, t.y - 10, t.w + 20, t.h + 20);
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(t.x, t.y, t.w, t.h);

  ctx.strokeStyle = C.town;
  ctx.lineWidth = 3;
  ctx.strokeRect(t.x, t.y, t.w, t.h);

  const cs = 12;
  ctx.strokeStyle = '#8888ff';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(t.x, t.y+cs); ctx.lineTo(t.x, t.y); ctx.lineTo(t.x+cs, t.y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(t.x+t.w-cs, t.y); ctx.lineTo(t.x+t.w, t.y); ctx.lineTo(t.x+t.w, t.y+cs); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(t.x, t.y+t.h-cs); ctx.lineTo(t.x, t.y+t.h); ctx.lineTo(t.x+cs, t.y+t.h); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(t.x+t.w-cs, t.y+t.h); ctx.lineTo(t.x+t.w, t.y+t.h); ctx.lineTo(t.x+t.w, t.y+t.h-cs); ctx.stroke();

  ctx.font = 'bold 14px monospace';
  ctx.fillStyle = C.text;
  ctx.textAlign = 'center';
  ctx.fillText(t.name, t.x + t.w/2, t.y + t.h/2 - 10);

  ctx.font = '10px monospace';
  ctx.fillStyle = C.textDim;
  ctx.fillText(t.desc, t.x + t.w/2, t.y + t.h/2 + 10);

  ctx.textAlign = 'left';
}

function renderPlayer() {
  if (!player.alive) return;
  drawCar(player.x, player.y, player.angle, 'player', player.flashTimer > 0);
}

function renderEnemies() {
  for (const e of enemies) {
    if (!e.alive) continue;
    drawCar(e.x, e.y, e.angle, e.type === 'rammer' ? 'rammer' : 'enemy', e.flashTimer > 0);
  }
}

function drawCar(x, y, angle, type, flash) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  const w = 30, h = 18;

  let bodyColor, darkColor;
  if (type === 'player') { bodyColor = C.player; darkColor = C.playerDark; }
  else if (type === 'rammer') { bodyColor = C.enemyRammer; darkColor = C.enemyRammerDark; }
  else { bodyColor = C.enemy; darkColor = C.enemyDark; }

  if (flash) {
    ctx.fillStyle = '#ffffff';
  } else {
    ctx.fillStyle = bodyColor;
  }

  ctx.fillRect(-w/2, -h/2, w, h);

  // Rammer has a front ram bar
  if (type === 'rammer') {
    ctx.fillStyle = '#888888';
    ctx.fillRect(w/2 - 2, -h/2 - 2, 8, h + 4);
    ctx.fillStyle = '#aaaaaa';
    ctx.fillRect(w/2, -h/2, 6, h);
  }

  ctx.fillStyle = darkColor;
  ctx.fillRect(w/2 - 8, -h/2 + 3, 6, h - 6);

  ctx.fillStyle = '#888888';
  if (type !== 'rammer') {
    ctx.fillRect(w/2, -2, 10, 4);
  }

  ctx.fillStyle = '#ffff88';
  ctx.fillRect(w/2 - 2, -h/2 + 2, 3, 3);
  ctx.fillRect(w/2 - 2, h/2 - 5, 3, 3);

  ctx.fillStyle = '#ff0000';
  ctx.fillRect(-w/2, -h/2 + 2, 3, 3);
  ctx.fillRect(-w/2, h/2 - 5, 3, 3);

  // Type label for rammers
  if (type === 'rammer') {
    ctx.fillStyle = '#cc44ff';
    ctx.font = 'bold 6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('R', 0, 3);
    ctx.textAlign = 'left';
  }

  ctx.restore();
}

function renderBullets() {
  for (const b of bullets) {
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(Math.atan2(b.vy, b.vx));

    const fade = b.life / b.maxLife;
    ctx.globalAlpha = fade;
    ctx.fillStyle = b.isPlayer ? C.bullet : '#ff4444';
    ctx.fillRect(-6, -2, 12, 4);

    // Glow
    ctx.shadowColor = b.isPlayer ? '#ffff00' : '#ff4444';
    ctx.shadowBlur = 8;
    ctx.fillRect(-6, -2, 12, 4);
    ctx.shadowBlur = 0;

    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

function renderScraps() {
  for (const s of scraps) {
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.angle);

    const alpha = Math.min(1, s.life / 3);
    ctx.globalAlpha = alpha;

    ctx.fillStyle = C.scrap;
    ctx.fillRect(-6, -4, 12, 8);
    ctx.fillRect(-3, -7, 6, 14);

    // Glow
    ctx.shadowColor = C.gold;
    ctx.shadowBlur = 6;
    ctx.fillStyle = C.gold;
    ctx.fillRect(-3, -3, 6, 6);
    ctx.shadowBlur = 0;

    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

function renderParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = Math.max(0, alpha);
    ctx.fillStyle = p.color;

    if (p.type === 'debris') {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 0.6);
      ctx.restore();
    } else if (p.type === 'smoke') {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (1 + (1 - alpha) * 0.5), 0, PI * 2);
      ctx.fill();
    } else if (p.type === 'fire') {
      ctx.shadowColor = p.color;
      ctx.shadowBlur = p.size * 2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * alpha, 0, PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    } else {
      // spark / trail
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * alpha, 0, PI * 2);
      ctx.fill();
    }

    ctx.globalAlpha = 1;
  }
}

function renderEffects() {
  for (const ef of effects) {
    const p = ef.t / ef.maxT;
    if (ef.type === 'flash') {
      ctx.globalAlpha = p;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(ef.x, ef.y, 12 * (1 - p), 0, PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (ef.type === 'spark') {
      ctx.globalAlpha = p;
      ctx.fillStyle = C.spark;
      for (let i = 0; i < 5; i++) {
        const a = (i / 5) * PI * 2;
        const r = 15 * (1 - p);
        ctx.fillRect(ef.x + Math.cos(a)*r - 2, ef.y + Math.sin(a)*r - 2, 4, 4);
      }
      ctx.globalAlpha = 1;
    } else if (ef.type === 'explosion') {
      ctx.globalAlpha = p * 0.8;
      ctx.strokeStyle = '#ff4400';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(ef.x, ef.y, 60 * (1 - p), 0, PI * 2);
      ctx.stroke();
      ctx.fillStyle = `rgba(255,${Math.floor(100*(1-p))},0,${p * 0.5})`;
      ctx.beginPath();
      ctx.arc(ef.x, ef.y, 40 * (1 - p * 0.5), 0, PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (ef.type === 'pickup') {
      ctx.globalAlpha = p;
      ctx.font = 'bold 16px monospace';
      ctx.fillStyle = C.gold;
      ctx.textAlign = 'center';
      ctx.fillText('+SCRAP', ef.x, ef.y - 20 * (1 - p));
      ctx.textAlign = 'left';
      ctx.globalAlpha = 1;
    }
  }
}

// ═══════════════════════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════════════════════

function renderHUD() {
  const pad = 12;
  const barW = 110, barH = 14;

  // Top-left panel — slightly wider for more info
  ctx.fillStyle = 'rgba(10,10,10,0.85)';
  ctx.fillRect(pad - 4, pad - 4, 360, 130);
  ctx.strokeStyle = C.hudBorder;
  ctx.lineWidth = 2;
  ctx.strokeRect(pad - 4, pad - 4, 360, 130);

  ctx.font = '11px monospace';
  ctx.textAlign = 'left';

  // Hull bar (most important — top)
  ctx.fillStyle = C.textDim;
  ctx.fillText('HULL', pad, pad + 12);
  const hullPct = player.hull / player.maxHull;
  const hullCol = hullPct > 0.6 ? C.healthGreen : hullPct > 0.3 ? C.healthYellow : C.healthRed;
  drawBar(pad + 45, pad + 2, barW, barH, hullPct, hullCol);
  ctx.fillStyle = C.text;
  ctx.fillText(Math.ceil(player.hull) + '/' + player.maxHull, pad + barW + 48, pad + 12);

  // Armor bar
  ctx.fillStyle = C.textDim;
  ctx.fillText('ARMOR', pad, pad + 30);
  const armPct = player.armor / player.maxArmor;
  drawBar(pad + 45, pad + 20, barW, barH, armPct, '#888899');
  ctx.fillStyle = C.text;
  ctx.fillText(Math.ceil(player.armor) + '/' + player.maxArmor, pad + barW + 48, pad + 30);

  // Fuel bar with warning
  ctx.fillStyle = C.textDim;
  ctx.fillText('FUEL', pad, pad + 48);
  const fuelPct = player.fuel / player.maxFuel;
  const fuelColor = fuelPct < 0.2 ? C.healthRed : C.fuelBlue;
  drawBar(pad + 45, pad + 38, barW, barH, fuelPct, fuelColor);
  ctx.fillStyle = fuelPct < 0.2 ? C.healthRed : C.text;
  if (fuelPct < 0.2) {
    ctx.font = 'bold 11px monospace';
    ctx.fillText('LOW!', pad + barW + 48, pad + 48);
    ctx.font = '11px monospace';
  } else {
    ctx.fillText(Math.ceil(player.fuel) + '%', pad + barW + 48, pad + 48);
  }

  // Speed
  const speed = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
  ctx.fillStyle = C.textDim;
  ctx.fillText('SPD', pad, pad + 66);
  ctx.fillStyle = C.text;
  ctx.font = 'bold 13px monospace';
  ctx.fillText(Math.floor(speed * 0.6) + ' MPH', pad + 35, pad + 66);
  ctx.font = '11px monospace';

  // Credits + inventory row
  ctx.fillStyle = C.gold;
  ctx.font = 'bold 15px monospace';
  ctx.fillText('$' + credits, pad, pad + 84);
  ctx.font = '11px monospace';
  ctx.fillStyle = C.textDim;
  ctx.fillText('Scrap:' + scrapCount + '  Cargo:' + cargo, pad + 80, pad + 84);

  // Gun + armor upgrades
  ctx.fillStyle = C.textDim;
  ctx.fillText('GUN LV' + gunLevel + '  ARM+' + (armorCount * 30), pad, pad + 100);
  ctx.fillStyle = C.textDim;
  ctx.fillText('DMG:' + player.gunDamage, pad + 165, pad + 100);

  // Score + kills (NEW)
  ctx.fillStyle = C.text;
  ctx.fillText('Score:' + score, pad, pad + 116);
  ctx.fillStyle = C.textDim;
  ctx.fillText('Kills:' + enemiesDestroyed, pad + 90, pad + 116);

  // Minimap
  renderMinimap(canvas.width - 170 - pad, pad, 170, 120);
}

function drawBar(x, y, w, h, pct, color) {
  pct = Math.max(0, Math.min(1, pct));
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = color;
  ctx.fillRect(x + 1, y + 1, (w - 2) * pct, h - 2);
  ctx.strokeStyle = '#333333';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, w, h);
}

function renderMinimap(px, py, mw, mh) {
  ctx.fillStyle = 'rgba(5,5,5,0.88)';
  ctx.fillRect(px - 2, py - 2, mw + 4, mh + 4);
  ctx.strokeStyle = C.hudBorder;
  ctx.lineWidth = 2;
  ctx.strokeRect(px - 2, py - 2, mw + 4, mh + 4);

  ctx.font = '9px monospace';
  ctx.fillStyle = C.textDim;
  ctx.fillText('MAP', px + 2, py + 10);

  const scaleX = mw / WORLD_W;
  const scaleY = mh / WORLD_H;

  ctx.strokeStyle = '#555555';
  ctx.lineWidth = 2;
  for (const road of ROADS) {
    ctx.beginPath();
    ctx.moveTo(px + road[0][0] * scaleX, py + road[0][1] * scaleY);
    for (let i = 1; i < road.length; i++) {
      ctx.lineTo(px + road[i][0] * scaleX, py + road[i][1] * scaleY);
    }
    ctx.stroke();
  }

  for (const t of TOWNS) {
    ctx.fillStyle = C.town;
    const tx = px + (t.x + t.w/2) * scaleX;
    const ty = py + (t.y + t.h/2) * scaleY;
    ctx.fillRect(tx - 4, ty - 4, 8, 8);
  }

  // Enemy dots on minimap
  for (const e of enemies) {
    if (!e.alive) continue;
    ctx.fillStyle = e.type === 'rammer' ? C.enemyRammer : C.enemy;
    ctx.beginPath();
    ctx.arc(px + e.x * scaleX, py + e.y * scaleY, 2, 0, PI * 2);
    ctx.fill();
  }

  if (player.alive) {
    ctx.fillStyle = C.player;
    ctx.beginPath();
    ctx.arc(px + player.x * scaleX, py + player.y * scaleY, 3, 0, PI * 2);
    ctx.fill();
    // Direction indicator
    ctx.strokeStyle = C.player;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(px + player.x * scaleX, py + player.y * scaleY);
    ctx.lineTo(px + player.x * scaleX + Math.cos(player.angle) * 8,
               py + player.y * scaleY + Math.sin(player.angle) * 8);
    ctx.stroke();
  }
}

// ═══════════════════════════════════════════════════════════
// TOWN UI
// ═══════════════════════════════════════════════════════════

function renderTownUI() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const t = currentTown;
  const panelW = 480, panelH = 380;
  const px = (canvas.width - panelW) / 2;
  const py = (canvas.height - panelH) / 2;

  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(px, py, panelW, panelH);
  ctx.strokeStyle = C.town;
  ctx.lineWidth = 3;
  ctx.strokeRect(px, py, panelW, panelH);

  ctx.fillStyle = C.text;
  ctx.font = 'bold 22px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(t.name, px + panelW/2, py + 35);
  ctx.font = '12px monospace';
  ctx.fillStyle = C.textDim;
  ctx.fillText(t.desc, px + panelW/2, py + 55);

  const tabs = ['BUY', 'SELL', 'GARAGE'];
  const tabW = panelW / 3;
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = townTab === i ? '#222244' : '#111122';
    ctx.fillRect(px + i * tabW, py + 65, tabW, 32);
    ctx.strokeStyle = townTab === i ? C.town : '#333355';
    ctx.lineWidth = townTab === i ? 2 : 1;
    ctx.strokeRect(px + i * tabW, py + 65, tabW, 32);
    ctx.fillStyle = townTab === i ? C.text : C.textDim;
    ctx.font = 'bold 13px monospace';
    ctx.fillText('[' + (i+1) + '] ' + tabs[i], px + i * tabW + tabW/2, py + 86);
  }

  ctx.textAlign = 'left';
  ctx.strokeStyle = '#333355';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(px + 10, py + 100);
  ctx.lineTo(px + panelW - 10, py + 100);
  ctx.stroke();

  ctx.font = '13px monospace';
  if (townTab === 0) {
    const items = [
      { name: 'Fuel Can (+20 Fuel)', price: t.buy.fuel, color: C.fuelBlue },
      { name: 'Repair Kit (Full Repair)', price: t.buy.repair, color: C.healthGreen },
      { name: 'Armor Plate (+30 Armor)', price: t.buy.armor, color: '#888899' },
      { name: 'Machine Gun (+5 Damage)', price: t.buy.gun, color: '#ff6600' },
    ];
    for (let i = 0; i < items.length; i++) {
      const it = items[i];
      const y = py + 125 + i * 42;
      const sel = townSel === i;
      if (sel) {
        ctx.fillStyle = '#1a1a33';
        ctx.fillRect(px + 10, y - 14, panelW - 20, 36);
        ctx.strokeStyle = C.town;
        ctx.lineWidth = 1;
        ctx.strokeRect(px + 10, y - 14, panelW - 20, 36);
      }
      ctx.fillStyle = it.color;
      ctx.fillRect(px + 20, y - 5, 12, 12);
      ctx.fillStyle = sel ? C.text : C.textDim;
      ctx.fillText(it.name, px + 40, y + 4);
      ctx.fillStyle = credits >= it.price ? C.gold : '#664444';
      ctx.fillText('$' + it.price, px + panelW - 70, y + 4);
      if (sel) {
        ctx.fillStyle = C.textDim;
        ctx.fillText('ENTER to buy', px + panelW - 160, y + 4);
      }
    }
    ctx.font = '11px monospace';
    ctx.fillStyle = C.textDim;
    ctx.fillText('Your credits: $' + credits, px + 15, py + panelH - 15);

  } else if (townTab === 1) {
    const items = [
      { name: 'Scrap', qty: scrapCount, price: t.sell.scrap, color: C.scrap },
      { name: 'Cargo', qty: cargo, price: t.sell.cargo, color: '#88aa44' },
    ];
    for (let i = 0; i < items.length; i++) {
      const it = items[i];
      const y = py + 125 + i * 50;
      const sel = townSel === i;
      if (sel) {
        ctx.fillStyle = '#1a1a33';
        ctx.fillRect(px + 10, y - 14, panelW - 20, 42);
        ctx.strokeStyle = C.town;
        ctx.lineWidth = 1;
        ctx.strokeRect(px + 10, y - 14, panelW - 20, 42);
      }
      ctx.fillStyle = it.color;
      ctx.fillRect(px + 20, y - 5, 12, 12);
      ctx.fillStyle = sel ? C.text : C.textDim;
      ctx.fillText(it.name + ' x' + it.qty, px + 40, y + 4);
      ctx.fillStyle = C.gold;
      ctx.fillText('$' + it.price + ' each', px + panelW - 100, y + 4);
      if (sel && it.qty > 0) {
        ctx.fillStyle = C.textDim;
        ctx.fillText('ENTER to sell all', px + panelW - 160, y + 4);
      } else if (sel) {
        ctx.fillStyle = '#664444';
        ctx.fillText('None to sell', px + panelW - 160, y + 4);
      }
    }
    ctx.font = '11px monospace';
    ctx.fillStyle = C.textDim;
    ctx.fillText('Scrap from enemies + Cargo runs = profit!', px + 15, py + panelH - 15);

  } else if (townTab === 2) {
    ctx.fillStyle = C.text;
    ctx.font = '14px monospace';
    ctx.fillText('CURRENT CAR STATS', px + 20, py + 120);

    ctx.font = '12px monospace';
    const stats = [
      ['Hull', Math.ceil(player.hull) + ' / ' + player.maxHull],
      ['Armor', Math.ceil(player.armor) + ' / ' + player.maxArmor],
      ['Fuel', Math.ceil(player.fuel) + ' / ' + player.maxFuel],
      ['Gun Level', gunLevel + ' (DMG: ' + player.gunDamage + ')'],
      ['Armor Plates', armorCount],
    ];
    for (let i = 0; i < stats.length; i++) {
      const [label, val] = stats[i];
      ctx.fillStyle = C.textDim;
      ctx.fillText(label + ':', px + 30, py + 148 + i * 22);
      ctx.fillStyle = C.text;
      ctx.fillText(val, px + 160, py + 148 + i * 22);
    }

    const ry = py + 270;
    ctx.fillStyle = credits >= 50 ? '#1a1a2a' : '#0a0a15';
    ctx.fillRect(px + 15, ry, panelW - 30, 50);
    ctx.strokeStyle = credits >= 50 ? C.healthGreen : '#334433';
    ctx.lineWidth = 2;
    ctx.strokeRect(px + 15, ry, panelW - 30, 50);
    ctx.fillStyle = credits >= 50 ? C.text : '#555555';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('FULL REPAIR — $50', px + panelW/2 - 70, ry + 30);
    ctx.font = '11px monospace';
    ctx.fillStyle = C.textDim;
    ctx.fillText('Restores hull, armor, and fuel. ENTER to confirm.', px + panelW/2 - 110, ry + 44);

    ctx.textAlign = 'left';
    ctx.font = '11px monospace';
    ctx.fillStyle = C.textDim;
    ctx.fillText('Your credits: $' + credits, px + 15, py + panelH - 15);
  }

  ctx.font = '10px monospace';
  ctx.fillStyle = '#444466';
  ctx.textAlign = 'center';
  ctx.fillText('WASD/Arrows: Navigate   ENTER/SPACE: Select   1/2/3: Switch tabs   ESC: Exit', canvas.width/2, py + panelH + 18);
  ctx.textAlign = 'left';
}

function renderPaused() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.font = 'bold 36px monospace';
  ctx.fillStyle = C.text;
  ctx.textAlign = 'center';
  ctx.fillText('PAUSED', canvas.width/2, canvas.height/2);
  ctx.font = '16px monospace';
  ctx.fillStyle = C.textDim;
  ctx.fillText('Press ESC to resume', canvas.width/2, canvas.height/2 + 35);
  ctx.textAlign = 'left';
}

function renderGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.font = 'bold 48px monospace';
  ctx.fillStyle = C.healthRed;
  ctx.textAlign = 'center';
  ctx.fillText('WRECKED!', canvas.width/2, canvas.height/2 - 60);
  ctx.font = '18px monospace';
  ctx.fillStyle = C.text;
  ctx.fillText('Your car was destroyed.', canvas.width/2, canvas.height/2 - 20);
  ctx.fillStyle = C.gold;
  ctx.fillText('Respawn costs $50', canvas.width/2, canvas.height/2 + 15);
  ctx.fillStyle = C.textDim;
  ctx.fillText('Score: ' + score + '   Enemies destroyed: ' + enemiesDestroyed, canvas.width/2, canvas.height/2 + 45);
  ctx.font = '14px monospace';
  if (credits >= 50) {
    ctx.fillStyle = C.text;
    ctx.fillText('Press SPACE to respawn', canvas.width/2, canvas.height/2 + 80);
  } else {
    ctx.fillStyle = '#664444';
    ctx.fillText('Not enough credits to respawn!', canvas.width/2, canvas.height/2 + 80);
  }
  ctx.textAlign = 'left';
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════

function dist(x1, y1, x2, y2) {
  return Math.sqrt((x2-x1)*(x2-x1) + (y2-y1)*(y2-y1));
}

function clamp(v, lo, hi) {
  return Math.max(lo, Math.min(hi, v));
}

function normalizeAngle(a) {
  while (a > PI) a -= PI * 2;
  while (a < -PI) a += PI * 2;
  return a;
}

function isOnRoad(x, y) {
  for (const road of ROADS) {
    for (let i = 0; i < road.length - 1; i++) {
      const [x1, y1] = road[i];
      const [x2, y2] = road[i+1];
      const d = pointToSegmentDist(x, y, x1, y1, x2, y2);
      if (d < ROAD_W/2 + 5) return true;
    }
  }
  return false;
}

function pointToSegmentDist(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const lenSq = dx*dx + dy*dy;
  if (lenSq === 0) return dist(px, py, x1, y1);
  let t = ((px - x1)*dx + (py - y1)*dy) / lenSq;
  t = clamp(t, 0, 1);
  return dist(px, py, x1 + t*dx, y1 + t*dy);
}

// ═══════════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════════

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  update(dt);
  render();

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(ts => {
  lastTime = ts;
  gameLoop(ts);
});
</script>
