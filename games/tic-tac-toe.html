  <div class="divider"></div>

    <div class="container">
        <header>
            <a href="games.html">← Back to Games</a>
            <h1 class="header">⭕ Tic-Tac-Toe</h1>
        </header>
        
        <div class="status" id="status">Your turn (X)</div>
        <div class="board" id="board"></div>
        <button class="btn" onclick="initGame()">New Game</button>
    </div>

    <script>
        let board = [];
        let currentPlayer = 'X';
        let gameOver = false;
        
        const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        
        function initGame() {
            board = ['','','','','','','','',''];
            currentPlayer = 'X';
            gameOver = false;
            document.getElementById('status').textContent = 'Your turn (X)';
            
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => makeMove(i);
                boardEl.appendChild(cell);
            }
        }
        
        function makeMove(i) {
            if (gameOver || board[i]) return;
            
            board[i] = currentPlayer;
            document.getElementById('board').children[i].textContent = currentPlayer;
            
            // Check win
            for (const [a,b,c] of wins) {
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    document.getElementById('status').textContent = `🎉 ${currentPlayer} wins!`;
                    gameOver = true;
                    return;
                }
            }
            
            // Check draw
            if (!board.includes('')) {
                document.getElementById('status').textContent = "It's a draw!";
                gameOver = true;
                return;
            }
            
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            document.getElementById('status').textContent = currentPlayer === 'X' ? 'Your turn (X)' : "Computer's turn (O)";
            
            if (currentPlayer === 'O') {
                setTimeout(computerMove, 500);
            }
        }
        
        function computerMove() {
            const empty = board.map((v,i) => v === '' ? i : -1).filter(i => i >= 0);
            if (empty.length && !gameOver) {
                makeMove(empty[Math.floor(Math.random() * empty.length)]);
            }
        }
        
        initGame();
    </script>
