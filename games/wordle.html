    <p class="hero-sub"></p>
  </header>
  <div class="divider"></div>

    <div class="container">
        <header>
            <a href="games.html">← Back to Games</a>
            <h1 class="header">🟩 Wordle Clone</h1>
            <p>Guess the 5-letter word in 6 tries</p>
        </header>
        
        <div class="grid" id="grid"></div>
        <div class="message" id="message"></div>
        <div class="keyboard" id="keyboard"></div>
    </div>

    <script>
        const words = ['READ', 'BOOK', 'STORY', 'WORDS', 'PAGES', 'WRITE', 'NOVEL', 'PLOTS', 'GENRE', 'TITLE', 'AUTHOR', 'READS', 'PAPER', 'INDEX', 'WORDS'];
        const answer = words[Math.floor(Math.random() * words.length)];
        let currentRow = 0;
        let currentCol = 0;
        let gameOver = false;
        
        const keyboard = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM'];
        
        function init() {
            // Build grid
            const grid = document.getElementById('grid');
            for (let i = 0; i < 6; i++) {
                const row = document.createElement('div');
                row.className = 'row';
                for (let j = 0; j < 5; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${i}-${j}`;
                    row.appendChild(cell);
                }
                grid.appendChild(row);
            }
            
            // Build keyboard
            const kb = document.getElementById('keyboard');
            keyboard.forEach((row, ri) => {
                row.split('').forEach(letter => {
                    const key = document.createElement('button');
                    key.className = 'key';
                    key.textContent = letter;
                    key.onclick = () => typeLetter(letter);
                    kb.appendChild(key);
                });
                if (ri === 2) {
                    const enter = document.createElement('button');
                    enter.className = 'key';
                    enter.textContent = 'ENTER';
                    enter.onclick = checkWord;
                    kb.appendChild(enter);
                }
            });
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') checkWord();
                else if (e.key === 'Backspace') deleteLetter();
                else if (/^[A-Z]$/.test(e.key)) typeLetter(e.key);
            });
        }
        
        function typeLetter(l) {
            if (gameOver || currentCol >= 5) return;
            document.getElementById(`cell-${currentRow}-${currentCol}`).textContent = l;
            currentCol++;
        }
        
        function deleteLetter() {
            if (gameOver || currentCol <= 0) return;
            currentCol--;
            document.getElementById(`cell-${currentRow}-${currentCol}`).textContent = '';
        }
        
        function checkWord() {
            if (currentCol < 5) return;
            
            let guess = '';
            for (let i = 0; i < 5; i++) {
                guess += document.getElementById(`cell-${currentRow}-${i}`).textContent;
            }
            
            const result = [];
            const answerChars = answer.split('');
            
            // First pass: correct positions
            for (let i = 0; i < 5; i++) {
                if (guess[i] === answer[i]) {
                    result[i] = 'correct';
                    answerChars[i] = null;
                }
            }
            
            // Second pass: wrong positions
            for (let i = 0; i < 5; i++) {
                if (!result[i]) {
                    const idx = answerChars.indexOf(guess[i]);
                    if (idx >= 0) {
                        result[i] = 'present';
                        answerChars[idx] = null;
                    } else {
                        result[i] = 'wrong';
                    }
                }
            }
            
            // Update cells
            for (let i = 0; i < 5; i++) {
                const cell = document.getElementById(`cell-${currentRow}-${i}`);
                cell.classList.add(result[i]);
                
                // Update keyboard
                const key = document.querySelector(`.key:not([id])`);
                document.querySelectorAll('.key').forEach(k => {
                    if (k.textContent === guess[i] && !k.classList.contains('correct')) {
                        k.classList.remove('present', 'wrong');
                        k.classList.add(result[i]);
                    }
                });
            }
            
            if (guess === answer) {
                document.getElementById('message').textContent = '🎉 You won!';
                gameOver = true;
            } else if (currentRow >= 5) {
                document.getElementById('message').textContent = `Game over! Word was ${answer}`;
                gameOver = true;
            } else {
                currentRow++;
                currentCol = 0;
            }
        }
        
        init();
    </script>

</body>
