<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google-adsense-account" content="ca-pub-9312870448453345">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Starter | Bithues Reading Lab</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #0a0a0f; --surface: #12121a; --border: #2a2a3a; --text: #e8e8f0; --text-dim: #7a7a90; --accent: #7c3aed; }
        [data-theme="light"] { --bg: #f5f5f5; --surface: #ffffff; --border: #e0e0e0; --text: #1a1a1a; --text-dim: #666666; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; padding: 1rem; }
        .container { max-width: 700px; margin: 0 auto; }
        header { text-align: center; padding: 1rem 0; margin-bottom: 2rem; border-bottom: 1px solid var(--border); }
        header a { color: var(--accent); text-decoration: none; }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        
        .prompts { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; text-align: center; }
        .prompt-label { color: var(--text-dim); margin-bottom: 1rem; font-size: 0.9rem; }
        .prompt { font-size: 1.5rem; font-weight: bold; color: var(--accent); min-height: 3rem; }
        
        .btn { padding: 0.75rem 1.5rem; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; margin: 0.25rem; }
        .btn-secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
        
        .writing-area { width: 100%; min-height: 200px; padding: 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: Georgia, serif; font-size: 1rem; line-height: 1.8; resize: vertical; }
        
        @media (max-width: 600px) { .prompt { font-size: 1.2rem; } }
    </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9312870448453345"
 crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <header>
            <a href="games.html">← Back to Games</a>
            <h1 class="header">✍️ Story Starter</h1>
            <p>Use random prompts to spark your creativity</p>
        </header>
        
        <div class="prompts">
            <p class="prompt-label">Your writing prompt:</p>
            <p class="prompt" id="prompt">Press Generate to start!</p>
            <div>
                <button class="btn" onclick="generatePrompt()">🔄 New Prompt</button>
            </div>
        </div>
        
        <p class="prompt-label">Start writing your story:</p>
        <textarea class="writing-area" id="storyArea" placeholder="Once upon a time..."></textarea>
        <div style="text-align: center; margin-top: 1rem;">
            <button class="btn btn-secondary" onclick="clearStory()">Clear</button>
            <button class="btn btn-secondary" onclick="saveStory()">💾 Save to Browser</button>
        </div>
        
        <div id="savedNote" style="display:none; text-align:center; color: var(--text-dim); margin-top: 0.5rem;">Saved! 📝</div>
    </div>

    <script>
        const prompts = {
            character: [
                "A retired detective who solves one last case",
                "A child who can talk to animals",
                "An alien who just landed on Earth",
                "A time traveler from the year 3024",
                "A ghost who doesn't know they died",
                "A robot learning what emotions are",
                "A wizard who lost their magic",
                "A detective who can see the future"
            ],
            setting: [
                "in an abandoned library",
                "on a space station",
                "in a small town during a storm",
                "in a magical forest",
                "in a city that never sleeps",
                "under the ocean",
                "in a time loop",
                "at a mysterious mansion"
            ],
            conflict: [
                "must find a missing person",
                "has 24 hours to save the world",
                "discovers a dark secret",
                "must choose between two impossible options",
                "is being hunted by something",
                "finds a mysterious object",
                "must break an ancient curse",
                "is the only one who remembers"
            ]
        };
        
        function generatePrompt() {
            const c = prompts.character[Math.floor(Math.random() * prompts.character.length)];
            const s = prompts.setting[Math.floor(Math.random() * prompts.setting.length)];
            const co = prompts.conflict[Math.floor(Math.random() * prompts.conflict.length)];
            
            document.getElementById('prompt').textContent = `${c} ${s} ${co}.`;
        }
        
        function clearStory() {
            document.getElementById('storyArea').value = '';
            document.getElementById('savedNote').style.display = 'none';
        }
        
        function saveStory() {
            const story = document.getElementById('storyArea').value;
            localStorage.setItem('bithuesStory', story);
            document.getElementById('savedNote').style.display = 'block';
            setTimeout(() => document.getElementById('savedNote').style.display = 'none', 2000);
        }
        
        // Load saved story
        const saved = localStorage.getItem('bithuesStory');
        if (saved) document.getElementById('storyArea').value = saved;
        
        generatePrompt();
    </script>
</body>
</html>
