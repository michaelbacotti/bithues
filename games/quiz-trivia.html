<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Challenge | Bithues Reading Lab</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #0a0a0f; --surface: #12121a; --border: #2a2a3a; --text: #e8e8f0; --text-dim: #7a7a90; --accent: #7c3aed; --correct: #10b981; --wrong: #ef4444; }
        [data-theme="light"] { --bg: #f5f5f5; --surface: #ffffff; --border: #e0e0e0; --text: #1a1a1a; --text-dim: #666666; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; padding: 1rem; }
        .container { max-width: 600px; margin: 0 auto; }
        header { text-align: center; padding: 1rem 0; margin-bottom: 2rem; border-bottom: 1px solid var(--border); }
        header a { color: var(--accent); text-decoration: none; }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        
        .question-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .question { font-size: 1.1rem; margin-bottom: 1.5rem; }
        
        .options { display: flex; flex-direction: column; gap: 0.75rem; }
        .option { padding: 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; text-align: left; color: var(--text); font-size: 1rem; }
        .option:hover { border-color: var(--accent); }
        .option.correct { background: var(--correct); border-color: var(--correct); color: white; }
        .option.wrong { background: var(--wrong); border-color: var(--wrong); color: white; }
        .option.disabled { pointer-events: none; }
        
        .next-btn { display: none; width: 100%; padding: 1rem; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; margin-top: 1rem; }
        
        .result { text-align: center; display: none; }
        .result h2 { font-size: 2rem; margin-bottom: 1rem; }
        .restart { padding: 1rem 2rem; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
        
        .score { text-align: center; color: var(--text-dim); margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="games.html">← Back to Games</a>
            <h1>❓ Trivia Challenge</h1>
            <p>Test your knowledge!</p>
        </header>
        
        <div class="score">Question <span id="qNum">1</span>/10 | Score: <span id="score">0</span></div>
        
        <div id="quiz">
            <div class="question-card">
                <p class="question" id="question">Loading...</p>
                <div class="options" id="options"></div>
            </div>
            <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
        </div>
        
        <div class="result" id="result">
            <h2>🎉 Quiz Complete!</h2>
            <p>You scored <span id="finalScore">0</span> out of 10</p>
            <button class="restart" onclick="restartQuiz()">Play Again</button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "What is the largest planet in our solar system?", options: ["Mars", "Jupiter", "Saturn", "Neptune"], correct: 1 },
            { q: "Who painted the Mona Lisa?", options: ["Michelangelo", "Leonardo da Vinci", "Raphael", "Donatello"], correct: 1 },
            { q: "What is the capital of Japan?", options: ["Seoul", "Beijing", "Tokyo", "Bangkok"], correct: 2 },
            { q: "Which element has the chemical symbol 'Au'?", options: ["Silver", "Aluminum", "Gold", "Argon"], correct: 2 },
            { q: "In what year did World War II end?", options: ["1943", "1944", "1945", "1946"], correct: 2 },
            { q: "What is the largest ocean on Earth?", options: ["Atlantic", "Indian", "Arctic", "Pacific"], correct: 3 },
            { q: "Who wrote 'Romeo and Juliet'?", options: ["Charles Dickens", "Jane Austen", "William Shakespeare", "Mark Twain"], correct: 2 },
            { q: "What is the hardest natural substance on Earth?", options: ["Gold", "Iron", "Diamond", "Platinum"], correct: 2 },
            { q: "How many continents are there?", options: ["5", "6", "7", "8"], correct: 2 },
            { q: "What is the largest mammal?", options: ["Elephant", "Blue Whale", "Giraffe", "Hippopotamus"], correct: 1 },
        ];

        let currentQuestion = 0;
        let score = 0;
        
        function loadQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question').textContent = q.q;
            document.getElementById('qNum').textContent = currentQuestion + 1;
            
            const opts = document.getElementById('options');
            opts.innerHTML = '';
            
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.textContent = opt;
                btn.onclick = () => selectOption(i);
                opts.appendChild(btn);
            });
            
            document.getElementById('nextBtn').style.display = currentQuestion < questions.length - 1 ? 'block' : 'none';
        }
        
        function selectOption(i) {
            const q = questions[currentQuestion];
            const opts = document.querySelectorAll('.option');
            
            opts.forEach((opt, idx) => {
                opt.classList.add('disabled');
                if (idx === q.correct) opt.classList.add('correct');
            });
            
            if (i === q.correct) {
                score++;
                document.getElementById('score').textContent = score;
            } else {
                opts[i].classList.add('wrong');
            }
            
            if (currentQuestion === questions.length - 1) {
                setTimeout(showResult, 500);
            }
        }
        
        function nextQuestion() {
            currentQuestion++;
            loadQuestion();
        }
        
        function showResult() {
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            document.getElementById('finalScore').textContent = score;
        }
        
        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            document.getElementById('score').textContent = '0';
            document.getElementById('quiz').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            loadQuestion();
        }
        
        loadQuestion();
    </script>
</body>
</html>
