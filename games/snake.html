<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google-adsense-account" content="ca-pub-9312870448453345">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake | Bithues Reading Lab</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #0a0a0f; --surface: #12121a; --border: #2a2a3a; --text: #e8e8f0; --text-dim: #7a7a90; --accent: #7c3aed; }
        [data-theme="light"] { --bg: #f5f5f5; --surface: #ffffff; --border: #e0e0e0; --text: #1a1a1a; --text-dim: #666666; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; padding: 1rem; text-align: center; }
        .container { max-width: 400px; margin: 0 auto; }
        header { padding: 1rem 0; margin-bottom: 1rem; border-bottom: 1px solid var(--border); }
        header a { color: var(--accent); text-decoration: none; }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        
        .score { font-size: 1.2rem; margin-bottom: 1rem; }
        #gameCanvas { background: var(--surface); border: 2px solid var(--border); border-radius: 8px; }
        
        .btn { padding: 0.75rem 1.5rem; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; margin-top: 1rem; }
        
        .controls { margin-top: 1rem; color: var(--text-dim); font-size: 0.9rem; }
    </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9312870448453345"
 crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <header>
            <a href="games.html">← Back to Games</a>
            <h1 class="header">🐍 Snake</h1>
        </header>
        
        <div class="score">Score: <span id="scoreVal">0</span> | High: <span id="highVal">0</span></div>
        <canvas id="gameCanvas" width="300" height="300"></canvas>
        <button class="btn" onclick="startGame()">Start Game</button>
        
        <div class="controls">Use Arrow Keys or WASD to move</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const cellSize = 15;
        const cols = canvas.width / cellSize;
        const rows = canvas.height / cellSize;
        
        let snake, food, direction, score, gameInterval, highScore = 0;
        
        function startGame() {
            snake = [{x: 10, y: 10}];
            direction = {x: 1, y: 0};
            score = 0;
            document.getElementById('scoreVal').textContent = 0;
            spawnFood();
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(update, 100);
        }
        
        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * cols),
                y: Math.floor(Math.random() * rows)
            };
        }
        
        function update() {
            const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};
            
            // Wall collision
            if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
                gameOver();
                return;
            }
            
            // Self collision
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                gameOver();
                return;
            }
            
            snake.unshift(head);
            
            // Eat food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('scoreVal').textContent = score;
                if (score > highScore) {
                    highScore = score;
                    document.getElementById('highVal').textContent = highScore;
                }
                spawnFood();
            } else {
                snake.pop();
            }
            
            draw();
        }
        
        function draw() {
            ctx.fillStyle = '#12121a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw snake
            ctx.fillStyle = '#7c3aed';
            snake.forEach((s, i) => {
                ctx.fillRect(s.x * cellSize, s.y * cellSize, cellSize - 2, cellSize - 2);
            });
            
            // Draw food
            ctx.fillStyle = '#10b981';
            ctx.fillRect(food.x * cellSize, food.y * cellSize, cellSize - 2, cellSize - 2);
        }
        
        function gameOver() {
            clearInterval(gameInterval);
            alert(`Game Over! Score: ${score}`);
        }
        
        document.addEventListener('keydown', (e) => {
            const key = e.key;
            if (key === 'ArrowUp' || key === 'w') direction = {x: 0, y: -1};
            else if (key === 'ArrowDown' || key === 's') direction = {x: 0, y: 1};
            else if (key === 'ArrowLeft' || key === 'a') direction = {x: -1, y: 0};
            else if (key === 'ArrowRight' || key === 'd') direction = {x: 1, y: 0};
        });
        
        draw();
    </script>
</body>
</html>
