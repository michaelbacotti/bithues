<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google-adsense-account" content="ca-pub-9312870448453345">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genre Quiz | Bithues Reading Lab</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #0a0a0f; --surface: #12121a; --border: #2a2a3a; --text: #e8e8f0; --text-dim: #7a7a90; --accent: #7c3aed; }
        [data-theme="light"] { --bg: #f5f5f5; --surface: #ffffff; --border: #e0e0e0; --text: #1a1a1a; --text-dim: #666666; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; padding: 1rem; }
        .container { max-width: 600px; margin: 0 auto; }
        header { text-align: center; padding: 1rem 0; margin-bottom: 2rem; border-bottom: 1px solid var(--border); }
        header a { color: var(--accent); text-decoration: none; }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        
        .question-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .question { font-size: 1.1rem; margin-bottom: 1.5rem; }
        
        .options { display: flex; flex-direction: column; gap: 0.75rem; }
        .option { padding: 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.2s; text-align: left; color: var(--text); font-size: 1rem; }
        .option:hover { border-color: var(--accent); }
        .option.selected { background: var(--accent); color: white; border-color: var(--accent); }
        
        .next-btn { width: 100%; padding: 1rem; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; margin-top: 1rem; }
        .next-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .result { text-align: center; display: none; background: var(--surface); border: 1px solid var(--accent); border-radius: 12px; padding: 2rem; }
        .result h2 { font-size: 1.5rem; margin-bottom: 1rem; color: var(--accent); }
        .result p { color: var(--text-dim); margin-bottom: 1.5rem; font-size: 1.1rem; }
        .genre-result { font-size: 2rem; font-weight: bold; margin: 1rem 0; }
        .restart { padding: 1rem 2rem; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
        
        @media (max-width: 600px) { h1 { font-size: 1.5rem; } }
    </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9312870448453345"
 crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <header>
            <a href="games.html">← Back to Games</a>
            <h1 class="header">🔮 Genre Quiz</h1>
            <p>What book should you read next?</p>
        </header>
        
        <div id="quiz">
            <div class="question-card">
                <p class="question" id="question">Loading...</p>
                <div class="options" id="options"></div>
            </div>
            <button class="next-btn" id="nextBtn" onclick="nextQuestion()" disabled>Next Question →</button>
        </div>
        
        <div class="result" id="result">
            <h2>Your Perfect Genre Is...</h2>
            <div class="genre-result" id="genreResult">?</div>
            <p id="genreDesc">Description here</p>
            <button class="restart" onclick="restartQuiz()">Try Again</button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "What do you like in a story?", options: ["Epic battles & magic", "Solving mysteries", "Love & relationships", "Exploring ideas"], scores: [0, 1, 2, 3] },
            { q: "Pick a setting:", options: ["Fantasy kingdom", "Modern city", "Historical era", "Space/ FUTURE"], scores: [0, 2, 1, 3] },
            { q: "What appeals to you most?", options: ["Good vs. evil", "Whodunit", "Emotional journey", "Mind-bending concepts"], scores: [0, 1, 2, 3] },
            { q: "Favorite type of character?", options: ["Hero on a quest", "Brilliant detective", "Relatable everyman", "Scientific genius"], scores: [0, 1, 2, 3] },
            { q: "What's your reading mood?", options: ["Escape reality", "Be challenged", "Feel deeply", "Learn something"], scores: [0, 3, 2, 1] },
        ];
        
        const genres = [
            { name: "Fantasy", desc: "You love epic adventures with magic, mythical creatures, and hero's journeys!" },
            { name: "Mystery/Thriller", desc: "You enjoy solving puzzles and suspenseful plots that keep you guessing!" },
            { name: "Romance", desc: "You love emotional stories about love, relationships, and human connection!" },
            { name: "Science Fiction", desc: "You enjoy exploring futuristic concepts and mind-bending ideas!" },
        ];
        
        let currentQuestion = 0;
        let answers = [];
        
        function loadQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question').textContent = q.q;
            document.getElementById('nextBtn').disabled = true;
            
            const opts = document.getElementById('options');
            opts.innerHTML = '';
            
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.textContent = opt;
                btn.onclick = () => selectOption(i);
                opts.appendChild(btn);
            });
        }
        
        function selectOption(i) {
            const opts = document.querySelectorAll('.option');
            opts.forEach(o => o.classList.remove('selected'));
            opts[i].classList.add('selected');
            answers.push(questions[currentQuestion].scores[i]);
            document.getElementById('nextBtn').disabled = false;
        }
        
        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }
        
        function showResult() {
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            
            const avg = answers.reduce((a,b) => a+b, 0) / answers.length;
            const genre = genres[Math.round(avg)];
            
            document.getElementById('genreResult').textContent = genre.name;
            document.getElementById('genreDesc').textContent = genre.desc;
        }
        
        function restartQuiz() {
            currentQuestion = 0;
            answers = [];
            document.getElementById('quiz').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            loadQuestion();
        }
        
        loadQuestion();
    </script>
</body>
</html>
