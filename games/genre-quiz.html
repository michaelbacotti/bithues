<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="Genre quiz on Bithues Reading Lab" />
  <meta name="google-adsense-account" content="ca-pub-9312870448453345" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9312870448453345" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
  <nav>
    <div class="nav-brand">Bithues <span>Reading Lab</span></div>
    <div class="nav-links">
      <a href="../index.html">Home</a>
      <a href="../stories.html">Stories</a>
      <a href="../catalog.html">Reviews</a>
      <a href="../articles.html">Articles</a>
      <a href="../about.html">About</a>
      <a href="../contact.html">Contact</a>
    </div>
  </nav>
  <header class="hero" style="padding:3rem 2rem;">
    <div class="hero-eyebrow">Game</div>
    <h1>Genre Quiz</h1>
    <p class="hero-sub"></p>
  </header>
  <div class="divider"></div>

    <div class="container">
        <header>
            <a href="games.html">← Back to Games</a>
            <h1 class="header">🔮 Genre Quiz</h1>
            <p>What book should you read next?</p>
        </header>
        
        <div id="quiz">
            <div class="question-card">
                <p class="question" id="question">Loading...</p>
                <div class="options" id="options"></div>
            </div>
            <button class="next-btn" id="nextBtn" onclick="nextQuestion()" disabled>Next Question →</button>
        </div>
        
        <div class="result" id="result">
            <h2>Your Perfect Genre Is...</h2>
            <div class="genre-result" id="genreResult">?</div>
            <p id="genreDesc">Description here</p>
            <button class="restart" onclick="restartQuiz()">Try Again</button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "What do you like in a story?", options: ["Epic battles & magic", "Solving mysteries", "Love & relationships", "Exploring ideas"], scores: [0, 1, 2, 3] },
            { q: "Pick a setting:", options: ["Fantasy kingdom", "Modern city", "Historical era", "Space/ FUTURE"], scores: [0, 2, 1, 3] },
            { q: "What appeals to you most?", options: ["Good vs. evil", "Whodunit", "Emotional journey", "Mind-bending concepts"], scores: [0, 1, 2, 3] },
            { q: "Favorite type of character?", options: ["Hero on a quest", "Brilliant detective", "Relatable everyman", "Scientific genius"], scores: [0, 1, 2, 3] },
            { q: "What's your reading mood?", options: ["Escape reality", "Be challenged", "Feel deeply", "Learn something"], scores: [0, 3, 2, 1] },
        ];
        
        const genres = [
            { name: "Fantasy", desc: "You love epic adventures with magic, mythical creatures, and hero's journeys!" },
            { name: "Mystery/Thriller", desc: "You enjoy solving puzzles and suspenseful plots that keep you guessing!" },
            { name: "Romance", desc: "You love emotional stories about love, relationships, and human connection!" },
            { name: "Science Fiction", desc: "You enjoy exploring futuristic concepts and mind-bending ideas!" },
        ];
        
        let currentQuestion = 0;
        let answers = [];
        
        function loadQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question').textContent = q.q;
            document.getElementById('nextBtn').disabled = true;
            
            const opts = document.getElementById('options');
            opts.innerHTML = '';
            
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.textContent = opt;
                btn.onclick = () => selectOption(i);
                opts.appendChild(btn);
            });
        }
        
        function selectOption(i) {
            const opts = document.querySelectorAll('.option');
            opts.forEach(o => o.classList.remove('selected'));
            opts[i].classList.add('selected');
            answers.push(questions[currentQuestion].scores[i]);
            document.getElementById('nextBtn').disabled = false;
        }
        
        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }
        
        function showResult() {
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            
            const avg = answers.reduce((a,b) => a+b, 0) / answers.length;
            const genre = genres[Math.round(avg)];
            
            document.getElementById('genreResult').textContent = genre.name;
            document.getElementById('genreDesc').textContent = genre.desc;
        }
        
        function restartQuiz() {
            currentQuestion = 0;
            answers = [];
            document.getElementById('quiz').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            loadQuestion();
        }
        
        loadQuestion();
    </script>
  <footer>
    <div class="brand">Bithues <span>Reading Lab</span></div>
    <p>© <span id="year"></span> Bithues Reading Lab · <a href="../press.html">Press</a> · <a href="../contact.html">Contact</a> · <a href="../privacy.html">Privacy</a></p>
  </footer>
  <button class="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
